<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral Finance Written Response Explorer</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <!-- Marked JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            --panel-bg: rgba(30, 41, 59, 0.45);
            --border-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
            --panel-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 380px;
            background: rgba(15, 23, 42, 0.7);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            z-index: 10;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 38px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 13px;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            padding: 12px 16px;
            width: 100%;
            transition: var(--transition);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .sidebar-menu {
            overflow-y: auto;
            flex-grow: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        /* Chapter collapse/expand item */
        .chapter-group {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.01);
            transition: var(--transition);
            flex: 0 0 auto;
        }

        .chapter-header {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #c7d2fe;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            user-select: none;
        }

        .chapter-header:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .chapter-header::after {
            content: '▼';
            font-size: 9px;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .chapter-group.collapsed .chapter-header::after {
            transform: rotate(-90deg);
        }

        .question-list {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: max-height 0.3s ease-out;
            max-height: 1000px;
        }

        .chapter-group.collapsed .question-list {
            max-height: 0;
            padding: 0;
            overflow: hidden;
        }

        .question-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.4;
        }

        .question-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            transform: translateX(2px);
        }

        .question-item.active {
            background: rgba(99, 102, 241, 0.1) !important;
            color: #a5b4fc !important;
            font-weight: 500;
            border-left: 3px solid var(--accent);
            border-radius: 4px 8px 8px 4px;
        }

        .q-number-badge {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Main Workspace area */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(2, 6, 23, 0.1);
        }

        /* Top Bar */
        .top-bar {
            height: 80px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            flex-shrink: 0;
        }

        .q-title-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .q-subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .q-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Language Switcher Tabs */
        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px;
            gap: 4px;
        }

        .tab-button {
            background: transparent;
            border: none;
            border-radius: 16px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 16px;
            transition: var(--transition);
            outline: none;
        }

        .tab-button.active {
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        /* Content Container Scrollable */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Callout Prompt box */
        .prompt-box {
            background: rgba(30, 41, 59, 0.3);
            border-left: 4px solid #f59e0b;
            border-radius: 0 16px 16px 0;
            padding: 24px;
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--panel-shadow);
        }

        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .prompt-box .section-label::before {
            background: #f59e0b;
        }

        .solution-box .section-label::before {
            background: #06b6d4;
        }

        .prompt-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        /* Solution details Card */
        .solution-box {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--panel-shadow);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .solution-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        /* Standardized markdown elements inside solutions */
        .solution-text ul, .solution-text ol {
            margin-left: 20px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .solution-text li {
            line-height: 1.6;
            color: #cbd5e1;
        }

        .solution-text p {
            margin-bottom: 16px;
        }

        .solution-text blockquote {
            background: rgba(255,255,255,0.02);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
        }

        /* LaTeX display block centering */
        .katex-display {
            padding: 12px 0;
            margin: 8px 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* Dual Column side-by-side view styling */
        .dual-view-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            min-height: 100%;
        }

        @media (max-width: 1000px) {
            .dual-view-container {
                grid-template-columns: 1fr;
            }
        }

        .dual-column {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .column-header {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #a5b4fc;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Welcome panel if no question selected */
        .welcome-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 16px;
            text-align: center;
            padding: 40px;
        }

        .welcome-logo {
            font-size: 48px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .welcome-desc {
            max-width: 400px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Keyword highlight badges/pills */
        .term-highlight {
            display: inline-block;
            padding: 1px 6px;
            margin: 1px 2px;
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: 600;
            border: 1px solid;
            line-height: 1.4;
            vertical-align: baseline;
            transition: var(--transition);
        }
        .term-highlight:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }
        .term-theory {
            background-color: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.25);
            color: #818cf8;
        }
        .term-bias {
            background-color: rgba(236, 72, 153, 0.12);
            border-color: rgba(236, 72, 153, 0.25);
            color: #f472b6;
        }
        .term-concept {
            background-color: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.25);
            color: #60a5fa;
        }
        .term-rational {
            background-color: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.25);
            color: #34d399;
        }
        .term-negative {
            background-color: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.25);
            color: #f87171;
        }
    </style>
</head>
<body>

    <!-- Left Navigation Sidebar -->
    <div class="sidebar">

    <script>
        // Embed parsed JSON data here
        const studyData = [{"ch_num": 1, "ch_title_en": "CONSUMPTION, INVESTMENT, AND EXPECTED UTILITY THEORY (EUT)", "ch_title_vn": "TIÊU DÙNG, ĐẦU TƯ VÀ LÝ THUYẾT HỮU DỤNG KỲ VỌNG", "questions": [{"q_num": "1", "title_en": "Differentiate the following terms/concepts:", "title_vn": "Differentiate the following terms/concepts (Phân biệt các thuật ngữ/khái niệm sau):", "prompt_en": "", "prompt_vn": "", "solution_en": "*   **a. Prospect and probability distribution:**\n    *   *Prospect:* A contract/gamble that yields various outcomes (e.g., wealth levels) with associated probabilities, denoted as $P(x_1, p_1; x_2, p_2; ...)$.\n    *   *Probability distribution:* A mathematical concept describing all possible values and likelihoods that a random variable can take. A prospect is a specific discrete probability distribution of wealth outcomes.\n*   **b. Risk and uncertainty (Knightian distinction):**\n    *   *Risk:* A situation where the future outcomes are unknown, but the objective **probabilities associated with these outcomes are known** (e.g., flipping a fair coin).\n    *   *Uncertainty:* A situation where the future outcomes are unknown and their **probabilities cannot be determined or are unknown** (e.g., launching an entirely new product in an unprecedented market).\n*   **c. Utility function and expected utility:**\n    *   *Utility function ($u(w)$):* A mathematical function mapping an individual's wealth level ($w$) to their psychological level of satisfaction/well-being.\n    *   *Expected utility ($EU$):* The probability-weighted average of the utilities of all possible outcomes of a prospect: $EU = \\sum p_i u(w_i)$.\n*   **d. <span class=\"term-highlight term-concept\">Risk aversion</span>, <span class=\"term-highlight term-concept\">risk seeking</span>, and <span class=\"term-highlight term-concept\">risk neutrality</span>:**\n    *   *Risk aversion:* Preference for a certain outcome over a risky prospect of equal expected value. Characterized by a concave utility function ($u''(w) < 0$).\n    *   *Risk seeking:* Preference for a risky prospect over a certain outcome of equal expected value. Characterized by a convex utility function ($u''(w) > 0$).\n    *   *Risk neutrality:* Indifference between a certain outcome and a risky prospect of equal expected value. Characterized by a linear utility function ($u''(w) = 0$).", "solution_vn": "*   **a. Prospect and probability distribution (Triển vọng và Phân phối xác suất):**\n    *   *Prospect (Triển vọng):* Là một tập hợp các kết quả nhận được (ví dụ: tiền, của cải) đi kèm với các xác suất xảy ra tương ứng, ký hiệu là $P(x_1, p_1; x_2, p_2; ...)$.\n    *   *Probability distribution (Phân phối xác suất):* Là một khái niệm toán học rộng hơn, mô tả toàn bộ khả năng xảy ra của tất cả các giá trị có thể có của một biến ngẫu nhiên liên tục hoặc rời rạc. Một triển vọng có thể được xem là một dạng phân phối xác suất rời rạc cụ thể của cải/thu nhập.\n*   **b. Risk and uncertainty (Rủi ro và Sự mơ hồ/Không chắc chắn):**\n    *   *Risk (Rủi ro - Frank Knight):* Tình huống mà các kết quả tương lai chưa biết trước, nhưng chúng ta **biết rõ xác suất** xảy ra của từng kết quả (ví dụ: tung đồng xu, chơi xúc xắc).\n    *   *Uncertainty (Sự không chắc chắn/Mơ hồ):* Tình huống mà các kết quả tương lai chưa biết và chúng ta **không thể xác định hoặc không biết xác suất** xảy ra của chúng (ví dụ: đầu tư vào một thị trường mới tinh chưa từng có tiền lệ).\n*   **c. Utility function and expected utility (Hàm hữu dụng và Hữu dụng kỳ vọng):**\n    *   *Utility function ($u(w)$):* Hàm số thể hiện mức độ thỏa dụng (mức độ hài lòng) của một cá nhân đối với một mức của cải hoặc thu nhập cụ thể ($w$).\n    *   *Expected utility ($EU$):* Giá trị trung bình có trọng số xác suất của các mức hữu dụng từ tất cả các kết quả có thể xảy ra của một triển vọng: $EU = \\sum p_i u(w_i)$.\n*   **d. <span class=\"term-highlight term-concept\">Risk aversion</span>, <span class=\"term-highlight term-concept\">risk seeking</span>, and <span class=\"term-highlight term-concept\">risk neutrality</span> (<span class=\"term-highlight term-concept\">Né tránh rủi ro</span>, <span class=\"term-highlight term-concept\">Ưa thích rủi ro</span>, và <span class=\"term-highlight term-concept\">Trung dung với rủi ro</span>):**\n    *   *Risk aversion (Né tránh rủi ro):* Cá nhân thích một khoản tiền chắc chắn hơn là một triển vọng có giá trị kỳ vọng tương đương. Hàm hữu dụng lõm ($u''(w) < 0$).\n    *   *Risk seeking (Ưa thích rủi ro):* Cá nhân thích một triển vọng rủi ro hơn là một khoản tiền chắc chắn có giá trị bằng giá trị kỳ vọng của triển vọng đó. Hàm hữu dụng lồi ($u''(w) > 0$).\n    *   *Risk neutrality (Trung dung với rủi ro):* Cá nhân dửng dưng giữa một khoản tiền chắc chắn và một triển vọng có giá trị kỳ vọng tương đương. Hàm hữu dụng tuyến tính ($u''(w) = 0$)."}, {"q_num": "2", "title_en": "Rory's Consistency with Economic Rationality", "title_vn": "Rory's Consistency with Economic Rationality (Sự nhất quán trong lựa chọn của Rory)", "prompt_en": "When eating out, Rory prefers spaghetti over a hamburger. Last night, she had a choice of spaghetti or macaroni and cheese and decided on the spaghetti again. The night before, Rory had a choice of spaghetti, pizza, or a hamburger, and this time she had pizza. Then, today, she chose macaroni and cheese over a hamburger. Does her selection today indicate that Rory's choices are consistent with economic rationality? Why or why not?", "prompt_vn": "Khi đi ăn ngoài, Rory thích spaghetti hơn hamburger. Tối qua, cô ấy đứng trước lựa chọn giữa spaghetti hoặc nui phô mai và đã chọn spaghetti. Tối hôm trước đó, cô ấy đứng trước lựa chọn spaghetti, pizza, hoặc hamburger, và cô chọn pizza. Hôm nay, cô lại chọn nui phô mai thay vì hamburger. Lựa chọn hôm nay của cô ấy có nhất quán với tính duy lý kinh tế (economic rationality) không? Tại sao?", "solution_en": "*   **Solution & Analysis:**\n    To assess economic rationality, we must test whether Rory's choices satisfy the **<span class=\"term-highlight term-theory\">Transitivity Axiom</span>** (if $X \\succ Y$ and $Y \\succ Z$, then $X \\succ Z$).\n    Let us compile Rory's revealed preferences from the problem:\n    1. Spaghetti over Hamburger: $Spaghetti \\succ Hamburger$\n    2. Spaghetti over Macaroni & Cheese: $Spaghetti \\succ Macaroni$\n    3. Pizza over Spaghetti and Hamburger: $Pizza \\succ Spaghetti$ and $Pizza \\succ Hamburger$\n       Combining (3) and (2) gives a tentative chain: $Pizza \\succ Spaghetti \\succ Macaroni$.\n    4. Today's choice: Macaroni & Cheese over Hamburger: $Macaroni \\succ Hamburger$.\n    *   **<span class=\"term-highlight term-rational\">Conclusion:</span>** Rory's choices are **fully consistent** with economic rationality. Her complete, transitive preference ranking is:\n        $$\\color{#eab308}{Pizza \\succ Spaghetti \\succ Macaroni \\succ Hamburger}$$\n        Since there are no intransitive loops (e.g., no cycle where a hamburger is preferred to pizza), her behavior is economically rational.", "solution_vn": "*   **Hướng dẫn giải:**\n    Để kiểm tra tính duy lý kinh tế, ta cần xét xem các lựa chọn của Rory có tuân thủ **Tính bắc cầu (Transitivity)** hay không.\n    *   Từ các lựa chọn trước:\n        1. Thích spaghetti hơn hamburger: $Spaghetti \\succ Hamburger$\n        2. Chọn spaghetti thay vì nui phô mai: $Spaghetti \\succ Nui\\ phô\\ mai$\n        3. Chọn pizza thay vì spaghetti và hamburger: $Pizza \\succ Spaghetti$ và $Pizza \\succ Hamburger$\n        Từ (3) và (1) & (2), ta có thứ tự ưu tiên tạm thời: $Pizza \\succ Spaghetti \\succ Nui\\ phô\\ mai$ và $Spaghetti \\succ Hamburger$.\n    *   Hôm nay, Rory chọn nui phô mai thay vì hamburger: $Nui\\ phô\\ mai \\succ Hamburger$.\n    *   **<span class=\"term-highlight term-rational\">Kết luận:</span>** Sự lựa chọn này **hoàn toàn nhất quán** với tính duy lý kinh tế. Thứ tự ưu tiên hoàn chỉnh của Rory là:\n        $$\\color{#eab308}{Pizza \\succ Spaghetti \\succ Nui\\ phô\\ mai \\succ Hamburger}$$\n        Thứ tự này bắc cầu hoàn hảo và không tạo ra bất kỳ vòng lặp phi lý nào."}, {"q_num": "3", "title_en": "Quantitative Utility Problem", "title_vn": "Quantitative Utility Problem (Bài tập Hàm hữu dụng định lượng)", "prompt_en": "Consider a person with the following utility function over wealth: $u(w) = e^w$, where $e$ is the exponential function (approximately $2.7183$) and $w = \\text{wealth}$ in hundreds of thousands of dollars. Suppose that this person has a $40\\%$ chance of wealth of $\\$50,000$ and a $60\\%$ chance of wealth of $\\$1,000,000$ as summarized by $P(0.40, \\$50,000, \\$1,000,000)$.\n\n*   a. What is the expected value of wealth?\n*   b. Construct a graph of this utility function.\n*   c. Is this person risk averse, risk neutral, or a risk seeker?\n*   d. What is this person's certainty equivalent for the prospect?", "prompt_vn": "Xét một cá nhân có hàm hữu dụng đối với của cải là $u(w) = e^w$ (với $w$ là của cải tính bằng trăm nghìn USD, $e \\approx 2.7183$). Giả sử người này đối mặt với một triển vọng có $40\\%$ cơ hội có mức của cải $\\$50,000$ ($0.5$ trăm nghìn USD) và $60\\%$ cơ hội có mức của cải $\\$1,000,000$ ($10.0$ trăm nghìn USD), ký hiệu là $P(0.40, \\$50,000, \\$1,000,000)$.\n\n*   a. Giá trị kỳ vọng của của cải là bao nhiêu?\n*   b. Phác họa đồ thị của hàm hữu dụng này.\n*   c. Cá nhân này né tránh rủi ro, trung dung với rủi ro hay ưa thích rủi ro?\n*   d. Giá trị tương đương chắc chắn (Certainty Equivalent - CE) của triển vọng này đối với cá nhân đó là bao nhiêu?", "solution_en": "*   **Step-by-Step Derivation:**\n    First, convert the wealth values into the units of the model (hundreds of thousands of dollars):\n    *   $w_1 = \\$50,000 / \\$100,000 = 0.5$ with probability $p_1 = 0.40$\n    *   $w_2 = \\$1,000,000 / \\$100,000 = 10.0$ with probability $p_2 = 0.60$\n\n    *   **Part a. <span class=\"term-highlight term-concept\">Expected Value</span> of Wealth ($E(w)$):**\n        $$\\color{#eab308}{E(w) = p_1 w_1 + p_2 w_2 = 0.40 \\times 0.5 + 0.60 \\times 10.0 = 0.2 + 6.0 = 6.2 \\text{ (hundreds of thousands of dollars)}}$$\n        Converted to dollars: **$E(w) = \\$620,000$**.\n\n    *   **Part b. Graphing $u(w) = e^w$:**\n        The graph is a standard strictly increasing, convex exponential curve. To construct the graph, calculate key coordinates:\n        *   At $w = 0.0$ (wealth of $\\$0$): $u(0.0) = e^0 = 1$\n        *   At $w = 0.5$ (wealth of $\\$50,000$): $u(0.5) = e^{0.5} \\approx 1.65$\n        *   At $w = 1.0$ (wealth of $\\$100,000$): $u(1.0) = e^1 \\approx 2.72$\n        *   At $w = 2.0$ (wealth of $\\$200,000$): $u(2.0) = e^2 \\approx 7.39$\n        *   At $w = 6.2$ (expected wealth of $\\$620,000$): $u(6.2) = e^{6.2} \\approx 492.75$\n        *   At $w = 10.0$ (wealth of $\\$1,000,000$): $u(10.0) = e^{10} \\approx 22,026.47$\n        Plot these coordinates on a graph with $w$ on the horizontal axis and $u(w)$ on the vertical axis, connecting them with a smooth, upward-curving line.\n\n    *   **Part c. Risk Preference Identification:**\n        *   **Exam Answer:** The individual is a **<span class=\"term-highlight term-concept\">Risk Seeker</span>** because the utility function $u(w) = e^w$ is strictly convex (curving upward), which is mathematically shown by a strictly positive second derivative:\n            $$\\color{#eab308}{u'(w) = e^w > 0 \\quad \\text{and} \\quad u''(w) = e^w > 0}$$\n            Since $u''(w) > 0$ for all $w$, the marginal utility of wealth is increasing, which characterizes a risk-seeking individual (who prefers a risky gamble over receiving its expected value with certainty).\n        *   *(Optional Detailed Numerical Proof: Compare Expected Utility $E[u(w)] \\approx 0.40 \\times e^{0.5} + 0.60 \\times e^{10} \\approx 13,216.54$ with the Utility of Expected Wealth $u(E[w]) = e^{6.2} \\approx 492.75$. Since $E[u(w)] > u(E[w])$, this numerically confirms the risk-seeking behavior.)*\n\n    *   **Part d. <span class=\"term-highlight term-concept\">Certainty Equivalent</span> ($CE$):**\n        By definition, $u(CE) = E[u(w)]$:\n        $$\\color{#eab308}{e^{CE} = 13216.539 \\implies CE = \\ln(13216.539) \\approx 9.4892 \\text{ (in hundreds of thousands of dollars)}}$$\n        Converted to dollars: **$CE \\approx \\$948,920$**.\n        *(Note: Because the agent is risk-seeking, their $CE$ is significantly higher than the expected wealth of $\\$620,000$.)*", "solution_vn": "*   **Hướng dẫn giải chi tiết:**\n    Đổi đơn vị của cải sang trăm nghìn USD ($w$):\n    *   $w_1 = 50,000 / 100,000 = 0.5$ với $p_1 = 0.40$\n    *   $w_2 = 1,000,000 / 100,000 = 10.0$ với $p_2 = 0.60$\n\n    *   **Câu a. <span class=\"term-highlight term-concept\">Giá trị kỳ vọng</span> của của cải (<span class=\"term-highlight term-concept\">Expected Value</span> of Wealth):**\n        $$\\color{#eab308}{E(w) = p_1 w_1 + p_2 w_2 = 0.40 \\times 0.5 + 0.60 \\times 10.0 = 0.2 + 6.0 = 6.2 \\text{ (trăm nghìn USD)}}$$\n        Vậy giá trị kỳ vọng là **$\\$620,000$**.\n\n    *   **Câu b. Phác họa đồ thị hàm hữu dụng $u(w) = e^w$:**\n        Hàm hữu dụng có dạng số mũ tăng dần cực kỳ nhanh (exponential growth) và là hàm lồi hướng lên trên (convex curve). Để phác họa đồ thị, ta tính các tọa độ điểm mốc:\n        *   Tại $w = 0.0$ (của cải $\\$0$): $u(0.0) = e^0 = 1$\n        *   Tại $w = 0.5$ (của cải $\\$50,000$): $u(0.5) = e^{0.5} \\approx 1.65$\n        *   Tại $w = 1.0$ (của cải $\\$100,000$): $u(1.0) = e^1 \\approx 2.72$\n        *   Tại $w = 2.0$ (của cải $\\$200,000$): $u(2.0) = e^2 \\approx 7.39$\n        *   Tại $w = 6.2$ (của cải kỳ vọng $\\$620,000$): $u(6.2) = e^{6.2} \\approx 492.75$\n        *   Tại $w = 10.0$ (của cải $\\$1,000,000$): $u(10.0) = e^{10} \\approx 22,026.47$\n        Vẽ các tọa độ này lên đồ thị với trục hoành là $w$ và trục tung là $u(w)$, rồi nối lại bằng một đường cong lồi hướng lên.\n\n    *   **Câu c. Xác định thái độ đối với rủi ro:**\n        *   **Đáp án thi tự luận:** Cá nhân này là người **<span class=\"term-highlight term-concept\">Ưa thích rủi ro</span> (<span class=\"term-highlight term-concept\">Risk seeker</span>)** vì hàm hữu dụng $u(w) = e^w$ là hàm lồi (hướng lên trên), có đạo hàm bậc hai luôn dương:\n            $$\\color{#eab308}{u'(w) = e^w > 0 \\quad \\text{và} \\quad u''(w) = e^w > 0}$$\n            Vì $u''(w) > 0$ với mọi $w$, hữu dụng biên của của cải tăng dần, đặc trưng cho thái độ ưa thích rủi ro (thích tham gia một triển vọng rủi ro hơn là nhận một khoản tiền chắc chắn bằng đúng giá trị kỳ vọng).\n        *   *(Phân tích tính toán bổ sung: So sánh Hữu dụng kỳ vọng $E[u(w)] \\approx 0.40 \\times e^{0.5} + 0.60 \\times e^{10} \\approx 13,216.54$ với Hữu dụng của giá trị kỳ vọng $u(E[w]) = e^{6.2} \\approx 492.75$. Vì $E[u(w)] > u(E[w])$, kết quả này xác nhận lại hành vi ưa thích rủi ro.)*\n\n    *   **Câu d. Tính Giá trị <span class=\"term-highlight term-concept\">tương đương chắc chắn</span> (<span class=\"term-highlight term-concept\">Certainty Equivalent</span> - <span class=\"term-highlight term-concept\">CE</span>):**\n        Theo định nghĩa của CE: $u(CE) = E[u(w)]$\n        $$\\color{#eab308}{e^{CE} = 13216.539 \\implies CE = \\ln(13216.539) \\approx 9.4892 \\text{ (trăm nghìn USD)}}$$\n        Quy đổi ra USD: **$CE \\approx \\$948,920$**."}, {"q_num": "4", "title_en": "Ordering Prospects & Certainty Equivalent", "title_vn": "Ordering Prospects & Certainty Equivalent (Xếp hạng triển vọng & Giá trị chắc chắn tương đương)", "prompt_en": "An individual has the following utility function: $u(w) = w^{0.5}$ where $w = \\text{wealth}$.\n\n*   a. Using expected utility, order the following prospects in terms of preference, from the most to the least preferred:\n*   $P_1(0.8, 1,000, 600)$\n*   $P_2(0.7, 1,200, 600)$\n*   $P_3(0.5, 2,000, 300)$\n*   b. What is the certainty equivalent for prospect $P_2$?\n*   c. Without doing any calculations, would the certainty equivalent for prospect $P_1$ be larger or smaller? Why?", "prompt_vn": "Một cá nhân có hàm hữu dụng sau: $u(w) = w^{0.5}$ với $w$ là của cải.\n\n*   a. Sử dụng lý thuyết hữu dụng kỳ vọng, hãy xếp hạng các triển vọng sau theo mức độ ưa thích từ nhiều nhất đến ít nhất:\n*   $P_1(0.8, 1,000, 600)$\n*   $P_2(0.7, 1,200, 600)$\n*   $P_3(0.5, 2,000, 300)$\n*   b. Tính giá trị tương đương chắc chắn ($CE$) của triển vọng $P_2$?\n*   c. Không cần tính toán, hãy cho biết giá trị tương đương chắc chắn của triển vọng $P_1$ sẽ lớn hơn hay nhỏ hơn $P_2$? Tại sao?", "solution_en": "*   **Step-by-Step Derivation:**\n    *   **Part a. Expected Utility Calculations:**\n        *   $EU(P_1) = 0.8 \\times \\sqrt{1000} + 0.2 \\times \\sqrt{600} = 0.8 \\times 31.6228 + 0.2 \\times 24.4949 \\approx 30.1972$\n        *   $EU(P_2) = 0.7 \\times \\sqrt{1200} + 0.3 \\times \\sqrt{600} = 0.7 \\times 34.6410 + 0.3 \\times 24.4949 \\approx 31.5972$\n        *   $EU(P_3) = 0.5 \\times \\sqrt{2000} + 0.5 \\times \\sqrt{300} = 0.5 \\times 44.7214 + 0.5 \\times 17.3205 \\approx 31.0210$\n        \n        Comparing Expected Utilities: $EU(P_2) > EU(P_3) > EU(P_1)$.\n        Therefore, the preference ranking is: **$P_2 \\succ P_3 \\succ P_1$**.\n\n    *   **Part b. <span class=\"term-highlight term-concept\">Certainty Equivalent</span> ($CE_2$) for $P_2$:**\n        $$\\color{#eab308}{u(CE_2) = EU(P_2) \\implies \\sqrt{CE_2} = 31.5972 \\implies CE_2 = (31.5972)^2 \\approx 998.38}$$\n        The certainty equivalent for $P_2$ is **$998.38$**.\n\n    *   **Part c. Conceptual Comparison of $CE$ between $P_1$ and $P_2$:**\n        *   The utility function $u(w) = \\sqrt{w}$ is strictly increasing ($u'(w) > 0$).\n        *   For any strictly increasing utility function, a higher expected utility ($EU$) always corresponds to a higher certainty equivalent ($CE$).\n        *   Since $EU(P_2) > EU(P_1)$, it must hold that **$CE(P_1) < CE(P_2)$** (the certainty equivalent of $P_1$ is **smaller** than that of $P_2$).", "solution_vn": "*   **Hướng dẫn giải chi tiết:**\n    *   **Câu a. Tính hữu dụng kỳ vọng của từng triển vọng:**\n        *   $EU(P_1) = 0.8 \\times \\sqrt{1000} + 0.2 \\times \\sqrt{600} = 0.8 \\times 31.6228 + 0.2 \\times 24.4949 \\approx 30.1972$\n        *   $EU(P_2) = 0.7 \\times \\sqrt{1200} + 0.3 \\times \\sqrt{600} = 0.7 \\times 34.6410 + 0.3 \\times 24.4949 \\approx 31.5972$\n        *   $EU(P_3) = 0.5 \\times \\sqrt{2000} + 0.5 \\times \\sqrt{300} = 0.5 \\times 44.7214 + 0.5 \\times 17.3205 \\approx 31.0210$\n        \n        So sánh mức hữu dụng kỳ vọng: $EU(P_2) > EU(P_3) > EU(P_1)$ ($31.5972 > 31.0210 > 30.1972$).\n        Thứ tự xếp hạng mức độ ưa thích từ nhiều nhất đến ít nhất: **$P_2 \\succ P_3 \\succ P_1$**.\n\n    *   **Câu b. Tính <span class=\"term-highlight term-concept\">Certainty Equivalent</span> ($CE$) của $P_2$:**\n        $$\\color{#eab308}{u(CE_2) = EU(P_2) \\implies \\sqrt{CE_2} = 31.5972 \\implies CE_2 = (31.5972)^2 \\approx 998.38}$$\n        Vậy giá trị tương đương chắc chắn của $P_2$ là **$998.38$**.\n\n    *   **Câu c. So sánh $CE$ của $P_1$ và $P_2$ không dùng tính toán:**\n        *   Hàm hữu dụng $u(w) = w^{0.5}$ là hàm tăng đơn điệu theo của cải ($u'(w) > 0$). Đối với bất kỳ hàm hữu dụng tăng đơn điệu nào, mức hữu dụng kỳ vọng ($EU$) cao hơn sẽ luôn tương ứng với giá trị tương đương chắc chắn ($CE$) cao hơn.\n        *   Vì ta đã biết $EU(P_2) > EU(P_1)$, chắc chắn rằng **$CE(P_1) < CE(P_2)$** (Giá trị chắc chắn tương đương của $P_1$ sẽ **nhỏ hơn** của $P_2$)."}, {"q_num": "5", "title_en": "The Allais Paradox", "title_vn": "The Allais Paradox (Nghịch lý Allais)", "prompt_en": "Consider two choice problems:\n\n**Problem 1:** Choose between Prospect A and Prospect B.\n*   **Prospect A:** $\\$2,500$ with probability $0.33$, $\\$2,400$ with probability $0.66$, and $\\$0$ with probability $0.01$.\n*   **Prospect B:** $\\$2,400$ with certainty ($1.00$).\n\n**Problem 2:** Choose between Prospect C and Prospect D.\n*   **Prospect C:** $\\$2,500$ with probability $0.33$, and $\\$0$ with probability $0.67$.\n*   **Prospect D:** $\\$2,400$ with probability $0.34$, and $\\$0$ with probability $0.66$.\n\nDaniel Kahneman and Amos Tversky (1979) showed that most people choose **B** over A in Problem 1, and **C** over D in Problem 2. Explain why these choices violate Expected Utility Theory (EUT).", "prompt_vn": "Xét hai vấn đề lựa chọn sau:\n\n**Vấn đề 1:** Chọn giữa Triển vọng A và Triển vọng B.\n*   **Triển vọng A:** $\\$2,500$ với xác suất $0.33$; $\\$2,400$ với xác suất $0.66$; $\\$0$ với xác suất $0.01$.\n*   **Triển vọng B:** $\\$2,400$ chắc chắn ($100\\%$).\n\n**Vấn đề 2:** Chọn giữa Triển vọng C và Triển vọng D.\n*   **Triển vọng C:** $\\$2,500$ với xác suất $0.33$; $\\$0$ với xác suất $0.67$.\n*   **Triển vọng D:** $\\$2,400$ với xác suất $0.34$; $\\$0$ với xác suất $0.66$.\n\nKahneman và Tversky (1979) đã chứng minh rằng phần lớn mọi người chọn **B** ở Vấn đề 1, và chọn **C** ở Vấn đề 2. Tại sao những lựa chọn này lại vi phạm Lý thuyết Hữu dụng Kỳ vọng ($EUT$)?", "solution_en": "*   **Exam Answer:**\n    The choice of B over A and C over D violates Expected Utility Theory (EUT) because it violates the **<span class=\"term-highlight term-theory\">Independence Axiom</span>**. \n    Specifically, this illustrates the **<span class=\"term-highlight term-bias\">Certainty Effect</span>** (or common consequence effect): people disproportionately overweight outcomes that are certain (Prospect B) compared to those that are merely highly probable (Prospect A). When the common consequence (a 66% chance of receiving $\\$2,400$) is removed from both prospects, the certainty of B is lost, and individuals switch to C (the higher-payoff risky option) even though the relative ratios of probabilities remain identical. This preference shift violates the independence axiom.\n    \n    *   *(Optional Mathematical Proof: Under EUT, assuming $u(0) = 0$:)*\n        *   *From Problem 1 (B $\\succ$ A):*\n            $$\\color{#eab308}{u(2400) > 0.33 u(2500) + 0.66 u(2400) \\implies 0.34 u(2400) > 0.33 u(2500) \\quad \\text{(Inequality 1)}}$$\n        *   *From Problem 2 (C $\\succ$ D):*\n            $$\\color{#eab308}{0.33 u(2500) > 0.34 u(2400) \\quad \\text{(Inequality 2)}}$$\n        *   *Contradiction:* Inequality 1 ($0.34 u(2400) > 0.33 u(2500)$) directly contradicts Inequality 2 ($0.33 u(2500) > 0.34 u(2400)$), mathematically demonstrating that no stable EUT utility function can explain these choices.\n\n---", "solution_vn": "*   **Đáp án thi tự luận:**\n    Quyết định chọn B hơn A và C hơn D vi phạm Lý thuyết Hữu dụng Kỳ vọng (EUT) vì nó vi phạm **<span class=\"term-highlight term-theory\">Tiên đề Độc lập</span> (<span class=\"term-highlight term-theory\">Independence Axiom</span>)**.\n    Cụ thể, hành vi này minh họa cho **<span class=\"term-highlight term-bias\">Hiệu ứng chắc chắn</span> (<span class=\"term-highlight term-bias\">Certainty Effect</span>)** (hay hiệu ứng hệ quả chung): con người có xu hướng đánh giá quá cao (áp đặt trọng số tâm lý lớn) cho các kết quả chắc chắn ($100\\%$ ở triển vọng B) so với các kết quả chỉ mang tính gần như chắc chắn ($99\\%$ ở triển vọng A). Khi hệ quả chung (66% cơ hội nhận được $\\$2,400$) bị loại bỏ khỏi cả hai phương án ở Vấn đề 2, tính chất \"chắc chắn\" của B bị biến mất, khiến người lựa chọn chuyển sang phương án C (có giá trị tiền mặt cao hơn và rủi ro cao hơn) dù tỷ lệ xác suất tương đối giữa các phương án không đổi. Sự thay đổi lựa chọn này vi phạm tiên đề độc lập.\n    \n    *   *(Chứng minh toán học bổ sung: Theo EUT, giả định $u(0) = 0$:)*\n        *   *Từ Vấn đề 1 (B $\\succ$ A):*\n            $$\\color{#eab308}{u(2400) > 0.33 u(2500) + 0.66 u(2400) \\implies 0.34 u(2400) > 0.33 u(2500) \\quad \\text{(Bất đẳng thức 1)}}$$\n        *   *Từ Vấn đề 2 (C $\\succ$ D):*\n            $$\\color{#eab308}{0.33 u(2500) > 0.34 u(2400) \\quad \\text{(Bất đẳng thức 2)}}$$\n        *   *Mâu thuẫn:* Bất đẳng thức 1 ($0.34 u(2400) > 0.33 u(2500)$) mâu thuẫn trực tiếp với Bất đẳng thức 2 ($0.33 u(2500) > 0.34 u(2400)$), chứng minh toán học rằng không có hàm hữu dụng EUT ổn định nào giải thích được quyết định này.\n\n---"}]}, {"ch_num": 2, "ch_title_en": "EFFICIENT MARKET HYPOTHESIS (EMH) AND INITIAL CHALLENGES", "ch_title_vn": "LÝ THUYẾT THỊ TRƯỜNG HIỆU QUẢ (EMH) VÀ NHỮNG THÁCH THỨC BAN ĐẦU", "questions": [{"q_num": "1", "title_en": "Differentiate the following terms/concepts:", "title_vn": "Differentiate the following terms/concepts (Phân biệt các khái niệm):", "prompt_en": "", "prompt_vn": "", "solution_en": "*   **a. Systematic and <span class=\"term-highlight term-concept\">nonsystematic risk</span>:**\n    *   *Systematic risk (Market risk):* Risk that affects the entire economy or market index (e.g., inflation, interest rate hikes, political crises). It cannot be diversified away. Measured by Beta ($\\beta$).\n    *   *Nonsystematic risk (Idiosyncratic risk):* Company-specific or industry-specific risk (e.g., a labor strike, product recall). It can be largely diversified away in a well-diversified portfolio.\n*   **b. <span class=\"term-highlight term-concept\">Beta</span> and <span class=\"term-highlight term-concept\">standard deviation</span>:**\n    *   *Beta ($\\beta$):* Measures the sensitivity of an asset's returns relative to the market portfolio. It is a metric of **<span class=\"term-highlight term-concept\">systematic risk</span>**.\n    *   *Standard deviation ($\\sigma$):* Measures the dispersion of an asset's returns around its mean. It is a metric of **<span class=\"term-highlight term-concept\">total risk</span>** (systematic + nonsystematic).\n*   **c. <span class=\"term-highlight term-concept\">Direct and indirect agency costs</span>:**\n    *   *Direct agency costs:* Explicit, measurable costs related to the agency relationship. This includes monitoring and bonding costs (spent to align incentives), as well as measurable managerial perquisites that benefit managers at the expense of shareholders (e.g., luxurious corporate jets, external audit fees).\n    *   *Indirect agency costs:* Reductions in firm value (residual losses) caused by managers making decisions that do not fully maximize shareholder wealth, such as lost opportunities due to managerial risk aversion or job security concerns (e.g., managers rejecting profitable high-NPV projects because they fear losing their jobs if the projects fail, or resisting a takeover attempt that benefits shareholders).\n*   **d. Weak, semi-strong, and <span class=\"term-highlight term-concept\">strong form</span> market efficiency:**\n    *   *Weak-form:* Stock prices fully reflect all historical trading data (past prices and volumes). Technical analysis cannot consistently earn risk-adjusted abnormal returns after transaction costs using this historical data.\n    *   *Semi-strong form:* Prices reflect all historical data and all publicly available information (financial statements, news). Both technical and fundamental analyses cannot consistently earn risk-adjusted abnormal returns after transaction and information-search costs.\n    *   *Strong form:* Prices reflect all information, public and private (insider information). No investor can consistently earn risk-adjusted abnormal returns after transaction costs.", "solution_vn": "*   **a. Systematic and <span class=\"term-highlight term-concept\">nonsystematic risk</span> (<span class=\"term-highlight term-concept\">Rủi ro hệ thống</span> và <span class=\"term-highlight term-concept\">Rủi ro phi hệ thống</span>):**\n    *   *Systematic risk (Rủi ro hệ thống / Rủi ro thị trường):* Là phần rủi ro ảnh hưởng đến toàn bộ thị trường hoặc nền kinh tế (ví dụ: lạm phát, lãi suất thay đổi, chiến tranh). Rủi ro này không thể loại bỏ bằng cách đa dạng hóa danh mục đầu tư. Đo lường bằng Hệ số Beta ($\\beta$).\n    *   *Nonsystematic risk (Rủi ro phi hệ thống / Rủi ro đặc thù):* Là phần rủi ro chỉ ảnh hưởng đến một công ty hoặc một ngành cụ thể. Rủi ro này có thể được đa dạng hóa phần lớn trong một danh mục đầu tư đa dạng hóa tốt.\n*   **b. <span class=\"term-highlight term-concept\">Beta</span> and <span class=\"term-highlight term-concept\">standard deviation</span> (<span class=\"term-highlight term-concept\">Hệ số Beta</span> và <span class=\"term-highlight term-concept\">Độ lệch chuẩn</span>):**\n    *   *Beta ($\\beta$):* Đo lường biến động của tỷ suất sinh lợi chứng khoán so với biến động của toàn bộ thị trường. Thước đo **<span class=\"term-highlight term-concept\">rủi ro hệ thống</span>**.\n    *   *Standard deviation ($\\sigma$):* Đo lường mức độ phân tán của tỷ suất sinh lợi chứng khoán xung quanh giá trị kỳ vọng. Thước đo **tổng rủi ro** (gồm cả rủi ro hệ thống và phi hệ thống).\n*   **c. <span class=\"term-highlight term-concept\">Direct and indirect agency costs</span> (<span class=\"term-highlight term-concept\">Chi phí đại diện trực tiếp và gián tiếp</span>):**\n    *   *Direct agency costs (Chi phí đại diện trực tiếp):* Các chi phí hữu hình và đo lường được phát sinh từ mối quan hệ đại diện. Chi phí này bao gồm chi phí giám sát và cam kết (để giảm thiểu bất đồng lợi ích), cũng như các đặc quyền quản lý mang lại lợi ích cho ban điều hành nhưng gây tốn kém cho cổ đông (ví dụ: mua chuyên cơ riêng, chi phí thuê kiểm toán bên ngoài).\n    *   *Indirect agency costs (Chi phí đại diện gián tiếp):* Phần giá trị doanh nghiệp bị hao hụt (residual loss) phát sinh từ các quyết định không tối đa hóa tài sản của ban quản lý vì lợi ích cá nhân, chẳng hạn như bỏ lỡ các cơ hội đầu tư tốt do ngại rủi ro hoặc lo ngại về an toàn công việc (ví dụ: từ chối các dự án có NPV dương vì sợ dự án thất bại dẫn đến mất việc, chống lại các thương vụ sáp nhập/thâu tóm có lợi cho cổ đông).\n*   **d. Weak, semi-strong, and <span class=\"term-highlight term-concept\">strong form</span> market efficiency (<span class=\"term-highlight term-concept\">Hiệu quả dạng yếu</span>, <span class=\"term-highlight term-concept\">dạng bán mạnh</span>, và <span class=\"term-highlight term-concept\">dạng mạnh</span>):**\n    *   *Weak-form (Dạng yếu):* Giá phản ánh toàn bộ thông tin trong lịch sử giao dịch (giá cả và khối lượng trong quá khứ). Phân tích kỹ thuật khó/không thể tạo lợi nhuận bất thường đã điều chỉnh rủi ro sau chi phí một cách nhất quán dựa trên tập thông tin lịch sử đó.\n    *   *Semi-strong form (Dạng bán mạnh):* Giá phản ánh toàn bộ thông tin công khai hiện tại. Cả phân tích kỹ thuật và phân tích cơ bản đều khó/không thể tạo lợi nhuận bất thường đã điều chỉnh rủi ro sau chi phí một cách nhất quán.\n    *   *Strong form (Dạng mạnh):* Giá phản ánh tất cả thông tin công khai lẫn thông tin nội bộ. Không nhà đầu tư nào có thể kiếm được lợi nhuận bất thường đã điều chỉnh rủi ro sau chi phí một cách nhất quán."}, {"q_num": "2", "title_en": "CAPM & Portfolio Math", "title_vn": "CAPM & Portfolio Math (Bài tập định lượng CAPM và Danh mục đầu tư)", "prompt_en": "A stock has a beta of $1.2$ and the standard deviation of its returns is $25\\%$. The market risk premium is $5\\%$ and the risk-free rate is $4\\%$.\n\n*   a. What is the expected return for the stock?\n*   b. What are the expected return and standard deviation for a portfolio that is equally invested in the stock and the risk-free asset?\n*   c. A financial analyst forecasts a return of $12\\%$ for the stock. Would you buy it? Why or why not?", "prompt_vn": "Một cổ phiếu có hệ số beta bằng $1.2$ và độ lệch chuẩn tỷ suất sinh lợi là $25\\%$. Phí bù rủi ro thị trường (Market Risk Premium - MRP) là $5\\%$ và lãi suất phi rủi ro là $4\\%$.\n\n*   a. Tỷ suất sinh lợi kỳ vọng của cổ phiếu này là bao nhiêu?\n*   b. Tỷ suất sinh lợi kỳ vọng và độ lệch chuẩn của một danh mục đầu tư đầu tư bằng nhau ($50/50$) vào cổ phiếu này và tài sản phi rủi ro là bao nhiêu?\n*   c. Một nhà phân tích tài chính dự báo tỷ suất sinh lợi của cổ phiếu này là $12\\%$. Bạn có mua cổ phiếu này không? Tại sao?", "solution_en": "*   **Step-by-Step Derivation:**\n    Given: $\\beta_i = 1.2$, $\\sigma_i = 25\\%$, $MRP = 5\\%$, $R_f = 4\\%$.\n\n    *   **Part a. Expected Return of the Stock (<span class=\"term-highlight term-theory\">CAPM</span>):**\n        $$\\color{#eab308}{E(R_i) = R_f + \\beta_i \\times MRP = 4\\% + 1.2 \\times 5\\% = 10\\%}$$\n\n    *   **Part b. Equally-weighted Portfolio (50% stock, 50% risk-free asset):**\n        *   Portfolio weights: $w_{stock} = 0.5$, $w_f = 0.5$.\n        *   Portfolio Expected Return ($E(R_p)$):\n            $$\\color{#eab308}{E(R_p) = w_{stock} E(R_i) + w_f R_f = 0.5 \\times 10\\% + 0.5 \\times 4\\% = 7\\%}$$\n        *   Portfolio Standard Deviation ($\\sigma_p$):\n            Since the risk-free asset has zero variance and zero correlation with the stock:\n            $$\\color{#eab308}{\\sigma_p = w_{stock} \\times \\sigma_i = 0.5 \\times 25\\% = 12.5\\%}$$\n\n    *   **Part c. Investment Decision:**\n        *   The analyst's forecasted return ($12\\%$) is greater than the required rate of return calculated by CAPM ($10\\%$).\n        *   This implies a positive abnormal return (Alpha): $\\alpha = 12\\% - 10\\% = +2\\%$. The stock is underpriced.\n        *   **Decision:** **Yes, buy the stock**.", "solution_vn": "*   **Hướng dẫn giải chi tiết:**\n    Cho trước: $\\beta_i = 1.2$, $\\sigma_i = 25\\% = 0.25$, $MRP = E(R_m) - R_f = 5\\%$, $R_f = 4\\%$.\n\n    *   **Câu a. Tỷ suất sinh lợi kỳ vọng của cổ phiếu theo <span class=\"term-highlight term-theory\">CAPM</span>:**\n        $$\\color{#eab308}{E(R_i) = R_f + \\beta_i \\times MRP = 4\\% + 1.2 \\times 5\\% = 10\\%}$$\n\n    *   **Câu b. Tính tỷ suất sinh lợi kỳ vọng và <span class=\"term-highlight term-concept\">độ lệch chuẩn</span> của danh mục $50/50$:**\n        *   Tỷ trọng: $w_{stock} = 0.5$, $w_f = 0.5$.\n        *   Tỷ suất sinh lợi kỳ vọng của danh mục ($E(R_p)$):\n            $$\\color{#eab308}{E(R_p) = w_{stock} E(R_i) + w_f R_f = 0.5 \\times 10\\% + 0.5 \\times 4\\% = 7\\%}$$\n        *   Độ lệch chuẩn của danh mục ($\\sigma_p$):\n            Vì tài sản phi rủi ro có độ lệch chuẩn bằng $0$ ($\\sigma_f = 0$):\n            $$\\color{#eab308}{\\sigma_p = w_{stock} \\times \\sigma_i = 0.5 \\times 25\\% = 12.5\\%}$$\n\n    *   **Câu c. Có nên mua cổ phiếu khi nhận dự báo sinh lợi $12\\%$ không?**\n        *   Tỷ suất sinh lợi dự báo ($12\\%$) lớn hơn tỷ suất sinh lợi kỳ vọng yêu cầu theo CAPM ($10\\%$).\n        *   Cổ phiếu đang tạo ra Alpha dương: $\\alpha = 12\\% - 10\\% = +2\\%$. Cổ phiếu đang bị định giá thấp (undervalued).\n        *   **Quyết định:** **Nên mua** cổ phiếu này."}, {"q_num": "3", "title_en": "The Joint Hypothesis Problem", "title_vn": "The Joint Hypothesis Problem (Vấn đề kiểm định đồng thời)", "prompt_en": "What is the joint hypothesis problem? Why is it important?", "prompt_vn": "Vấn đề kiểm định đồng thời (joint hypothesis problem) là gì? Tại sao nó lại quan trọng?", "solution_en": "*   **Definition:** Formulated by Eugene Fama (1970), the Joint Hypothesis Problem states that any empirical test of market efficiency is inherently a joint test of market efficiency and the underlying asset pricing model (e.g., CAPM, Fama-French 3-factor model) used to define \"normal\" returns.\n*   **Significance:** If an empirical test rejects the null hypothesis and identifies abnormal returns (anomalies), we cannot distinguish whether the market is inefficient or the asset pricing model is misspecified. This acts as a primary defense for EMH against behavioral critiques.", "solution_vn": "*   **Định nghĩa:** Vấn đề kiểm định đồng thời (Fama, 1970) cho rằng bất kỳ kiểm định thực nghiệm nào về giả thuyết thị trường hiệu quả (EMH) cũng **luôn luôn** được thực hiện đồng thời với một mô hình định giá tài sản (Asset Pricing Model).\n*   **Tầm quan trọng:** Nếu một kết quả thực nghiệm chỉ ra lợi nhuận bất thường, chúng ta không thể biết thị trường phi hiệu quả hay mô hình định giá tài sản đang dùng bị sai lệch. Đây là rào cản lớn nhất đối với tài chính hành vi khi cố gắng bác bỏ EMH một cách thực nghiệm."}, {"q_num": "4", "title_en": "Warren Buffett's Success & EMH", "title_vn": "Warren Buffett's Success & EMH (Thành công của Warren Buffett và EMH)", "prompt_en": "Warren Buffett has been a very successful investor. In 2008, Luisa Kroll reported that Buffett topped *Forbes Magazine*'s list of the world's richest people with a fortune estimated to be worth $\\$62$ billion (March 5, 2008, \"The world's billionaires,\" *Forbes*). Does this invalidate the EMH?", "prompt_vn": "Warren Buffett là một nhà đầu tư cực kỳ thành công. Vào năm 2008, Luisa Kroll đã báo cáo rằng Buffett đứng đầu danh sách những người giàu nhất thế giới của tạp chí *Forbes* với khối tài sản ước tính khoảng 62 tỷ USD (ngày 5 tháng 3 năm 2008, \"The world's billionaires\", *Forbes*). Sự thành công này có bác bỏ Lý thuyết Thị trường Hiệu quả (EMH) hay không?", "solution_en": "Warren Buffett’s investment track record **does not definitively invalidate <span class=\"term-highlight term-theory\">EMH</span>** due to:\n1.  **Law of Large Numbers (Outliers):** In a population of millions of coin-flippers, random chance dictates that a few individuals will flip heads continuously. Buffett may represent the extreme outlier of the probability distribution.\n2.  **Active Corporate Control and <span class=\"term-highlight term-concept\">Value</span> Investing:** Rather than passive trading on public markets, Buffett engages in active corporate control (private negotiated transactions, board restructuring, and value-oriented investing) to generate value, utilizing private negotiations and active operational improvements.\n3.  **Unmeasured Risk Factors:** His value investing style could be exposed to systematic risk factors (e.g., value, quality, or liquidity premiums) that are poorly captured by standard CAPM. His returns may represent compensation for bearing these systematic risks rather than pure alpha.", "solution_vn": "Sự thành công của Warren Buffett **không đủ để bác bỏ hoàn toàn <span class=\"term-highlight term-theory\">EMH</span>** vì:\n1.  **Quy luật số lớn (Outliers):** Trong đám đông hàng triệu nhà đầu tư tung đồng xu, quy luật ngẫu nhiên chỉ ra rằng chắc chắn sẽ có một số ít người tung được mặt ngửa liên tục. Buffett có thể là đại diện cho phần cực trị (outlier) của phân phối xác suất này.\n2.  **Kiểm soát doanh nghiệp chủ động và Đầu tư giá trị:** Thay vì chỉ giao dịch thụ động trên thị trường đại chúng, Buffett thực hiện kiểm soát doanh nghiệp chủ động (thương lượng các giao dịch mua lại tư nhân, tái cơ cấu ban quản lý để trực tiếp cải thiện hiệu quả và tạo ra giá trị) và đầu tư giá trị dựa trên thông tin đàm phán và sự can thiệp trực tiếp vào hoạt động doanh nghiệp.\n3.  **Yếu tố <span class=\"term-highlight term-concept\">rủi ro hệ thống</span> chưa đo lường (Risk Premium):** Hiệu quả vượt trội của ông có thể đến từ việc gánh chịu các yếu tố rủi ro hệ thống dài hạn (như phí bù rủi ro giá trị - value premium, hay phí bù chất lượng/lợi nhuận mạnh - quality/profitability premium) mà mô hình CAPM truyền thống không ghi nhận được đầy đủ."}, {"q_num": "5", "title_en": "Multi-stock Risk and CAPM Portfolio", "title_vn": "Multi-stock Risk and CAPM Portfolio (Bài tập rủi ro hai cổ phiếu)", "prompt_en": "You are considering whether to invest in two stocks, Stock A and Stock B. Stock A has a beta of $1.15$ and the standard deviation of its returns has been estimated to be $0.28$. For Stock B, the beta is $0.84$ and standard deviation is $0.48$.\n\n*   a. Which stock is riskier?\n*   b. If the risk-free rate is $4\\%$ and the market risk premium is $8\\%$, what is the expected return for a portfolio that is composed of $60\\%$ A and $40\\%$ B?\n*   c. If the correlation between the returns of A and B is $0.50$, what is the standard deviation for the portfolio that includes $60\\%$ A and $40\\%$ B?", "prompt_vn": "Bạn đang cân nhắc đầu tư vào hai cổ phiếu A và B. Cổ phiếu A có beta $\\beta_A = 1.15$ và độ lệch chuẩn $\\sigma_A = 0.28$. Cổ phiếu B có beta $\\beta_B = 0.84$ và độ lệch chuẩn $\\sigma_B = 0.48$.\n\n*   a. Cổ phiếu nào rủi ro hơn?\n*   b. Nếu lãi suất phi rủi ro là $4\\%$ và phí bù rủi ro thị trường là $8\\%$, tỷ suất sinh lợi kỳ vọng của một danh mục đầu tư gồm $60\\%$ cổ phiếu A và $40\\%$ cổ phiếu B là bao nhiêu?\n*   c. Nếu hệ số tương quan giữa tỷ suất sinh lợi của A và B là $0.50$, độ lệch chuẩn của danh mục đầu tư trên là bao nhiêu?", "solution_en": "*   **Step-by-Step Derivation:**\n    *   **Part a. Which stock is riskier?**\n        *   If risk is defined as *systematic risk* (Beta): **Stock A is riskier** because $\\beta_A = 1.15 > \\beta_B = 0.84$.\n        *   If risk is defined as *total risk* (Standard Deviation): **Stock B is riskier** because $\\sigma_B = 0.48 > \\sigma_A = 0.28$.\n    *   **Part b. Portfolio Expected Return ($60\\%$ A and $40\\%$ B):**\n        *   Calculate Portfolio Beta ($\\beta_p$):\n            $$\\color{#eab308}{\\beta_p = w_A \\beta_A + w_B \\beta_B = 0.6 \\times 1.15 + 0.4 \\times 0.84 = 0.69 + 0.336 = 1.026}$$\n        *   Calculate Expected Return ($E(R_p)$) using CAPM:\n            $$\\color{#eab308}{E(R_p) = R_f + \\beta_p \\times MRP = 4\\% + 1.026 \\times 8\\% = 12.208\\%}$$\n    *   **Part c. Portfolio <span class=\"term-highlight term-concept\">Standard Deviation</span> ($\\sigma_p$) with $\\rho_{AB} = 0.50$:**\n        $$\\color{#eab308}{\\sigma_p^2 = w_A^2 \\sigma_A^2 + w_B^2 \\sigma_B^2 + 2 w_A w_B \\sigma_A \\sigma_B \\rho_{AB}}$$\n        $$\\color{#eab308}{\\sigma_p^2 = (0.6)^2(0.28)^2 + (0.4)^2(0.48)^2 + 2(0.6)(0.4)(0.28)(0.48)(0.50)}$$\n        $$\\color{#eab308}{\\sigma_p^2 = 0.36(0.0784) + 0.16(0.2304) + 0.48(0.1344)(0.50) = 0.097344}$$\n        $$\\color{#eab308}{\\sigma_p = \\sqrt{0.097344} \\approx 0.312 \\text{ (or } 31.2\\%)}$$\n\n---", "solution_vn": "*   **Hướng dẫn giải chi tiết:**\n    *   **Câu a. Cổ phiếu nào rủi ro hơn?**\n        *   Nếu xét rủi ro hệ thống (Beta): **A rủi ro hơn** vì $\\beta_A = 1.15 > \\beta_B = 0.84$.\n        *   Nếu xét tổng rủi ro ($\\sigma$): **B rủi ro hơn** vì $\\sigma_B = 0.48 > \\sigma_A = 0.28$.\n    *   **Câu b. Tính tỷ suất sinh lợi kỳ vọng của danh mục ($60\\% A$ và $40\\% B$):**\n        *   Hệ số Beta của danh mục ($\\beta_p$):\n            $$\\color{#eab308}{\\beta_p = w_A \\beta_A + w_B \\beta_B = 0.6 \\times 1.15 + 0.4 \\times 0.84 = 1.026}$$\n        *   Tỷ suất sinh lợi kỳ vọng của danh mục:\n            $$\\color{#eab308}{E(R_p) = R_f + \\beta_p \\times MRP = 4\\% + 1.026 \\times 8\\% = 12.208\\%}$$\n    *   **Câu c. Tính <span class=\"term-highlight term-concept\">độ lệch chuẩn</span> của danh mục với $\\rho_{AB} = 0.50$:**\n        $$\\color{#eab308}{\\sigma_p^2 = w_A^2 \\sigma_A^2 + w_B^2 \\sigma_B^2 + 2 w_A w_B \\sigma_A \\sigma_B \\rho_{AB}}$$\n        $$\\color{#eab308}{\\sigma_p^2 = (0.6)^2(0.28)^2 + (0.4)^2(0.48)^2 + 2(0.6)(0.4)(0.28)(0.48)(0.50) = 0.097344}$$\n        $$\\color{#eab308}{\\sigma_p = \\sqrt{0.097344} \\approx 0.312 \\text{ (tức } 31.2\\%)}$$\n\n---"}]}, {"ch_num": 3, "ch_title_en": "PROSPECT THEORY (PT)", "ch_title_vn": "LÝ THUYẾT TRIỂN VỌNG (PROSPECT THEORY)", "questions": [{"q_num": "1", "title_en": "Differentiate the following terms/concepts:", "title_vn": "Differentiate the following terms/concepts (Phân biệt các khái niệm):", "prompt_en": "", "prompt_vn": "", "solution_en": "*   **a. Lottery and insurance:**\n    *   *Lottery:* Paying a small, certain loss (ticket price) to acquire a tiny probability of a massive gain. (Risk-seeking behavior for low-probability gains).\n    *   *Insurance:* Paying a small, certain loss (premium) to avoid a tiny probability of a catastrophic loss. (Risk-averse behavior for low-probability losses).\n*   **b. <span class=\"term-highlight term-concept\">Segregation</span> and <span class=\"term-highlight term-concept\">integration</span>:**\n    *   *Segregation:* Evaluating gains and losses separately inside distinct mental accounts.\n    *   *Integration:* Pooling gains and losses together to evaluate the net change in total wealth.\n*   **c. <span class=\"term-highlight term-concept\">Risk aversion</span> and <span class=\"term-highlight term-bias\">loss aversion</span>:**\n    *   *Risk aversion:* The preference for a sure payoff over a fair gamble (or mean-preserving spread) with the same expected value. In expected utility theory, it is mathematically represented by a concave utility function ($u''(w) < 0$).\n    *   *Loss aversion:* The tendency for losses relative to a reference point to loom larger than same-sized gains. Empirically, the pain of losing $\\$100$ is roughly twice as intense as the pleasure of gaining $\\$100$.\n*   **d. <span class=\"term-highlight term-concept\">Weighting function</span> and event probability:**\n    *   *Event probability ($p$):* The objective, statistical probability of an event.\n    *   *Weighting function ($\\pi(p)$):* The subjective decision weight assigned by individuals to that probability (typically overweighting low probabilities and underweighting moderate-to-high probabilities).", "solution_vn": "*   **a. Lottery and insurance (Vé số và Bảo hiểm):**\n    *   *Lottery (Vé số):* Chấp nhận khoản lỗ nhỏ chắc chắn để đổi lấy xác suất cực nhỏ có giải thưởng lớn (ưa thích rủi ro ở miền dương xác suất thấp).\n    *   *Insurance (Bảo hiểm):* Chấp nhận khoản lỗ nhỏ chắc chắn (phí bảo hiểm) để tránh xác suất cực nhỏ bị thiệt hại lớn (né tránh rủi ro ở miền âm xác suất thấp).\n*   **b. <span class=\"term-highlight term-concept\">Segregation</span> and <span class=\"term-highlight term-concept\">integration</span> (<span class=\"term-highlight term-concept\">Tách biệt</span> và Tích hợp tài khoản):**\n    *   *Segregation:* Đánh giá các quyết định hoặc kết quả một cách độc lập trong các tài khoản tinh thần riêng lẻ.\n    *   *Integration:* Gộp chung tất cả các kết quả và đánh giá dựa trên sự thay đổi tổng thể của cải ròng.\n*   **c. <span class=\"term-highlight term-concept\">Risk aversion</span> and <span class=\"term-highlight term-bias\">loss aversion</span> (<span class=\"term-highlight term-concept\">Né tránh rủi ro</span> và <span class=\"term-highlight term-bias\">Né tránh tổn thất</span>):**\n    *   *Risk aversion (Né tránh rủi ro):* Sự ưa thích một khoản nhận được chắc chắn (sure payoff) hơn là một trò chơi may rủi sòng phẳng (fair gamble) có cùng giá trị kỳ vọng. Trong lý thuyết EUT, điều này được biểu diễn bằng hàm hữu dụng lõm ($u''(w) < 0$).\n    *   *Loss aversion (Né tránh tổn thất):* Sự bất cân xứng tâm lý khi các khoản lỗ so với một điểm tham chiếu (reference point) luôn mang lại cảm giác đau khổ lớn hơn nhiều so với niềm vui từ các khoản lãi có cùng quy mô. Thực nghiệm cho thấy nỗi đau mất $\\$100$ gấp đôi niềm vui thắng $\\$100$.\n*   **d. <span class=\"term-highlight term-concept\">Weighting function</span> and event probability (<span class=\"term-highlight term-concept\">Hàm trọng số</span> và Xác suất khách quan):**\n    *   *Event probability ($p$):* Xác suất khách quan thực tế của sự kiện.\n    *   *Weighting function ($\\pi(p)$):* Trọng số quyết định chủ quan của con người (phóng đại xác suất thấp, đánh giá thấp xác suất trung bình và cao)."}, {"q_num": "2", "title_en": "Preference under Prospect Theory", "title_vn": "Preference under Prospect Theory (Lựa chọn theo Lý thuyết triển vọng)", "prompt_en": "According to prospect theory, which is preferred?\n*   a. Prospect A or B?\n*   Decision (i). Choose between:\n*   $A(0.80, \\$50, \\$0)$\n*   $B(0.40, \\$100, \\$0)$\n*   b. Prospect C or D?\n*   Decision (ii). Choose between:\n*   $C(0.00002, \\$500,000, \\$0)$\n*   $D(0.00001, \\$1,000,000, \\$0)$\n*   c. Are these choices consistent with expected utility theory? Why or why not?", "prompt_vn": "Theo lý thuyết triển vọng (prospect theory), phương án nào được ưa thích hơn?\n*   a. Triển vọng A hay B?\n*   Quyết định (i). Chọn giữa:\n*   $A(0.80, \\$50, \\$0)$\n*   $B(0.40, \\$100, \\$0)$\n*   b. Triển vọng C hay D?\n*   Quyết định (ii). Chọn giữa:\n*   $C(0.00002, \\$500,000, \\$0)$\n*   $D(0.00001, \\$1,000,000, \\$0)$\n*   c. Các lựa chọn này có nhất quán với Lý thuyết Hữu dụng Kỳ vọng (EUT) không? Tại sao?", "solution_en": "*   **Part a. Decision (i) [$A(0.80, \\$50, \\$0)$ vs. $B(0.40, \\$100, \\$0)$]:**\n    Both prospects have the same expected value of $\\$40$. Prospect A is preferred because, under **<span class=\"term-highlight term-theory\">Prospect Theory</span>**, decision makers evaluate prospects using both a concave **<span class=\"term-highlight term-concept\">value function</span>** for gains and a **<span class=\"term-highlight term-concept\">probability weighting</span>** function ($V = \\pi(p)v(x)$). The concave **<span class=\"term-highlight term-concept\">value function</span>** reduces the marginal attractiveness of the larger payoff in B ($v(100) < 2v(50)$), while the higher **<span class=\"term-highlight term-concept\">decision weight</span>** attached to the $0.80$ probability in A compared to the $0.40$ probability in B ($\\pi(0.80) > \\pi(0.40)$) makes the safer prospect A more attractive.\n*   **Part b. Decision (ii) [$C(0.00002, \\$500,000, \\$0)$ vs. $D(0.00001, \\$1,000,000, \\$0)$]:**\n    Both prospects have the same expected value of $\\$10$. At extremely low probabilities, people overweight small probabilities and become **risk-seeking** for gains. Since the difference between $0.00001$ and $0.00002$ is psychologically very small, decision makers focus more on the larger prize of $\\$1,000,000$, **preferring Prospect D**.\n*   **Part c. Consistency with <span class=\"term-highlight term-theory\">EUT</span>:**\n    These choices are **inconsistent with standard <span class=\"term-highlight term-theory\">Expected Utility Theory</span> (<span class=\"term-highlight term-theory\">EUT</span>)** under a stable utility function with a consistent attitude toward risk over gains.\n    *   **Exam Answer:** Under EUT, a stable utility function should imply a consistent attitude toward risk over these gain prospects. Choosing A over B (which have the same expected value) implies risk aversion because A is safer. However, choosing D over C (which also have the same expected value) implies risk seeking because D has the larger payoff but a lower probability. A stable concave utility function can explain A over B but not D over C, while a stable convex utility function can explain D over C but not A over B. Therefore, these choices are inconsistent with standard EUT because no single stable utility function can explain both preferences. Prospect Theory explains this inconsistency through probability weighting: very small probabilities are overweighted, making the larger prize in D psychologically attractive.\n    \n    *   *(Optional Algebraic CRRA Proof: Assume a standard CRRA utility function $u(w) = w^\\alpha$ where $w$ represents gains:)*\n        *   *Decision (i) (A $\\succ$ B):* $0.80 \\times 50^\\alpha > 0.40 \\times 100^\\alpha \\implies 2 > 2^\\alpha \\implies \\alpha < 1$ (standard risk aversion).\n        *   *Decision (ii) (D $\\succ$ C):* $0.00001 \\times 1,000,000^\\alpha > 0.00002 \\times 500,000^\\alpha \\implies 2^\\alpha > 2 \\implies \\alpha > 1$ (risk seeking).\n        *   *Contradiction:* We cannot have $\\alpha < 1$ and $\\alpha > 1$ simultaneously, proving these choices cannot be explained by a standard EUT utility function.", "solution_vn": "*   **Câu a. Lựa chọn Quyết định (i):** \n    Cả hai đều có giá trị kỳ vọng là $\\$40$. Triển vọng A được ưa thích hơn vì theo **<span class=\"term-highlight term-theory\">Lý thuyết Triển vọng</span>** (Prospect Theory), người ra quyết định đánh giá các phương án dựa trên cả **<span class=\"term-highlight term-concept\">hàm giá trị</span>** lõm ở miền lãi và **<span class=\"term-highlight term-concept\">hàm trọng số xác suất</span>** ($V = \\pi(p)v(x)$). **<span class=\"term-highlight term-concept\">Hàm giá trị</span>** lõm làm giảm mức độ hấp dẫn biên của mức lợi nhuận lớn hơn trong B ($v(100) < 2v(50)$), trong khi **<span class=\"term-highlight term-concept\">trọng số quyết định</span>** gắn với xác suất $0.80$ ở A lớn hơn nhiều so với xác suất $0.40$ ở B ($\\pi(0.80) > \\pi(0.40)$), khiến triển vọng ít rủi ro hơn (A) trở nên hấp dẫn hơn.\n*   **Câu b. Lựa chọn Quyết định (ii):** \n    Cả hai đều có giá trị kỳ vọng là $\\$10$. Ở vùng xác suất cực kỳ nhỏ, con người có xu hướng phóng đại các xác suất nhỏ và trở nên **<span class=\"term-highlight term-concept\">ưa thích rủi ro</span>** đối với các khoản lãi. Vì sự khác biệt giữa $0.00001$ và $0.00002$ về mặt tâm lý là rất nhỏ, người ra quyết định sẽ tập trung hơn vào phần thưởng lớn hơn là $\\$1,000,000$, do đó họ **chọn Triển vọng D**.\n*   **Câu c. Có nhất quán với $EUT$ không?**\n    Các lựa chọn này **không nhất quán với <span class=\"term-highlight term-theory\">Lý thuyết Hữu dụng Kỳ vọng</span> (<span class=\"term-highlight term-theory\">EUT</span>) chuẩn** dưới một hàm hữu dụng ổn định với thái độ nhất quán đối với rủi ro trong miền lãi.\n    *   **Đáp án thi tự luận:** Theo EUT, một hàm hữu dụng ổn định đòi hỏi thái độ nhất quán đối với rủi ro đối với các triển vọng lời này. Lựa chọn chọn A hơn B (cùng giá trị kỳ vọng) thể hiện sự né tránh rủi ro vì A an toàn hơn. Ngược lại, lựa chọn chọn D hơn C (cũng cùng giá trị kỳ vọng) lại thể hiện sự ưa thích rủi ro vì D có phần thưởng lớn hơn nhưng xác suất thấp hơn. Một hàm hữu dụng lõm ổn định chỉ giải thích được quyết định chọn A hơn B chứ không giải thích được chọn D hơn C; ngược lại, một hàm hữu dụng lồi ổn định chỉ giải thích được quyết định chọn D hơn C chứ không giải thích được chọn A hơn B. Do đó, không một hàm hữu dụng EUT ổn định nào có thể giải thích đồng thời cả hai lựa chọn này. Lý thuyết Triển vọng giải thích sự bất nhất này thông qua hàm trọng số xác suất: các xác suất cực kỳ nhỏ bị phóng đại về mặt tâm lý, khiến phần thưởng khổng lồ của D trở nên vô cùng hấp dẫn.\n    \n    *   *(Chứng minh đại số CRRA bổ sung: Giả định hàm hữu dụng dạng CRRA $u(w) = w^\\alpha$ với $w$ đại diện cho khoản lãi:)*\n        *   *Quyết định (i) (A $\\succ$ B):* $0.80 \\times 50^\\alpha > 0.40 \\times 100^\\alpha \\implies 2 > 2^\\alpha \\implies \\alpha < 1$ (né tránh rủi ro).\n        *   *Quyết định (ii) (D $\\succ$ C):* $0.00001 \\times 1.000.000^\\alpha > 0.00002 \\times 500.000^\\alpha \\implies 2^\\alpha > 2 \\implies \\alpha > 1$ (thích rủi ro).\n        *   *Mâu thuẫn:* Hệ số $\\alpha$ không thể vừa nhỏ hơn 1 vừa lớn hơn 1 cùng lúc, chứng tỏ EUT chuẩn không thể giải thích đồng thời hai lựa chọn này."}, {"q_num": "3", "title_en": "Quantitative Loss Aversion Problem", "title_vn": "Quantitative Loss Aversion Problem (Bài tập giá trị lý thuyết triển vọng)", "prompt_en": "Consider a person with the following value function under prospect theory:\n$$\\color{#eab308}{v(w) = w^{0.5} \\quad \\text{if } w \\ge 0}$$\n$$\\color{#eab308}{v(w) = -2(-w)^{0.5} \\quad \\text{if } w < 0}$$\n\n*   a. Is this individual loss averse? Explain.\n*   b. Assume that this individual weights values by probabilities, instead of using a prospect theory weighting function. Which of the following prospects would be preferred?\n*   $P_1(0.8, 1000, -800)$\n*   $P_2(0.7, 1200, -600)$\n*   $P_3(0.5, 2000, -1000)$", "prompt_vn": "Xét một cá nhân có hàm giá trị sau dưới lý thuyết triển vọng:\n$$\\color{#eab308}{v(w) = w^{0.5} \\quad \\text{nếu } w \\ge 0}$$\n$$\\color{#eab308}{v(w) = -2(-w)^{0.5} \\quad \\text{nếu } w < 0}$$\n\n*   a. Cá nhân này có né tránh tổn thất (loss averse) hay không? Giải thích.\n*   b. Giả sử người này tính toán giá trị của triển vọng bằng cách nhân trực tiếp giá trị với xác suất thực tế (không sử dụng hàm trọng số quyết định $\\pi(p)$). Hãy cho biết triển vọng nào sau đây được họ ưa thích nhất:\n*   $P_1(0.8, 1000, -800)$\n*   $P_2(0.7, 1200, -600)$\n*   $P_3(0.5, 2000, -1000)$", "solution_en": "*   **Step-by-Step Derivation:**\n    *   **Part a. <span class=\"term-highlight term-bias\">Loss Aversion</span> Identification:**\n        *   **Exam Answer:** The individual is **Loss Averse** because the coefficient of loss aversion $\\lambda$ is $2$ (which is greater than $1$). This is directly observed in the value function: for any gain $w \\ge 0$, the value is $w^{0.5}$, whereas for any loss $w < 0$, the value is multiplied by a penalty coefficient of $-2$. This means a loss of size $x$ hurts exactly twice as much as an equivalent gain of size $x$ pleases the individual.\n        *   *(Optional Mathematical Proof: Loss aversion is defined as $\\lambda = \\frac{|v(-x)|}{v(x)}$ for $x > 0$. Here, $v(x) = x^{0.5}$ and $v(-x) = -2(x)^{0.5} \\implies |v(-x)| = 2x^{0.5}$. Thus, $\\lambda = \\frac{2x^{0.5}}{x^{0.5}} = 2$. Since $\\lambda > 1$, the agent is loss averse.)*\n    *   **Part b. Evaluating Prospects using Raw Probabilities:**\n        *   **Prospect $P_1$:**\n            $$\\color{#eab308}{V(P_1) = 0.8 \\times v(1000) + 0.2 \\times v(-800) = 0.8 \\times (1000)^{0.5} + 0.2 \\times \\left(-2 \\times (800)^{0.5}\\right) \\approx 25.2982 - 11.3137 = 13.9845}$$\n        *   **Prospect $P_2$:**\n            $$\\color{#eab308}{V(P_2) = 0.7 \\times v(1200) + 0.3 \\times v(-600) = 0.7 \\times (1200)^{0.5} + 0.3 \\times \\left(-2 \\times (600)^{0.5}\\right) \\approx 24.2487 - 14.6969 = 9.5518}$$\n        *   **Prospect $P_3$:**\n            $$\\color{#eab308}{V(P_3) = 0.5 \\times v(2000) + 0.5 \\times v(-1000) = 0.5 \\times (2000)^{0.5} + 0.5 \\times \\left(-2 \\times (1000)^{0.5}\\right) \\approx 22.3607 - 31.6228 = -9.2621}$$\n        \n        *   **<span class=\"term-highlight term-rational\">Conclusion:</span>** Comparing values: $V(P_1) = 13.9845 > V(P_2) = 9.5518 > V(P_3) = -9.2621$.\n        *   The most preferred prospect is **$P_1$**.", "solution_vn": "*   **Hướng dẫn giải chi tiết:**\n    *   **Câu a. Cá nhân này có <span class=\"term-highlight term-bias\">né tránh tổn thất</span> không?**\n        *   **Đáp án thi tự luận:** Cá nhân này **<span class=\"term-highlight term-bias\">Né tránh tổn thất</span> (Loss Averse)** vì hệ số né tránh tổn thất $\\lambda = 2$ (lớn hơn $1$). Điều này được quan sát trực tiếp trên hàm giá trị: đối với miền lãi ($w \\ge 0$), giá trị là $w^{0.5}$, trong khi đối với miền lỗ ($w < 0$), giá trị bị nhân thêm một hệ số phạt là $-2$. Nghĩa là, một khoản lỗ quy mô $x$ sẽ gây ra nỗi đau lớn gấp đúng $2$ lần niềm vui do một khoản lãi cùng quy mô $x$ mang lại.\n        *   *(Chứng minh toán học bổ sung: Hệ số né tránh tổn thất được định nghĩa là $\\lambda = \\frac{|v(-x)|}{v(x)}$ với $x > 0$. Ở đây, $v(x) = x^{0.5}$ và $v(-x) = -2(x)^{0.5} \\implies |v(-x)| = 2x^{0.5}$. Do đó, $\\lambda = \\frac{2x^{0.5}}{x^{0.5}} = 2$. Vì $\\lambda > 1$, người này né tránh tổn thất.)*\n    *   **Câu b. Tính giá trị triển vọng ($V$) bằng xác suất khách quan:**\n        *   **Triển vọng $P_1$:**\n            $$\\color{#eab308}{V(P_1) = 0.8 \\times (1000)^{0.5} + 0.2 \\times (-2 \\times (800)^{0.5}) \\approx 25.2982 - 11.3137 = 13.9845}$$\n        *   **Triển vọng $P_2$:**\n            $$\\color{#eab308}{V(P_2) = 0.7 \\times (1200)^{0.5} + 0.3 \\times (-2 \\times (600)^{0.5}) \\approx 24.2487 - 14.6969 = 9.5518}$$\n        *   **Triển vọng $P_3$:**\n            $$\\color{#eab308}{V(P_3) = 0.5 \\times (2000)^{0.5} + 0.5 \\times (-2 \\times (1000)^{0.5}) \\approx 22.3607 - 31.6228 = -9.2621}$$\n        *   **<span class=\"term-highlight term-rational\">Kết luận:</span>** Triển vọng được ưa thích nhất là **$P_1$** (giá trị cao nhất: $13.9845$)."}, {"q_num": "4", "title_en": "Probability Weighting & Insurance", "title_vn": "Probability Weighting & Insurance (Trọng số quyết định và Hiện tượng mua Bảo hiểm)", "prompt_en": "Consider a person with the following value function under prospect theory:\n$$\\color{#eab308}{v(w) = w^{0.8} \\quad \\text{if } w \\ge 0}$$\n$$\\color{#eab308}{v(w) = -3(-w)^{0.8} \\quad \\text{if } w < 0}$$\nThis individual has the following weighting function:\n$$\\color{#eab308}{\\pi(p) = \\frac{p^\\gamma}{(p^\\gamma + (1 - p)^\\gamma)^{1/\\gamma}}}$$\nwhere we set $\\gamma = .65$.\n\n*   a. Which of the following prospects would he choose?\n*   $P_A(0.001, -5000)$\n*   $P_B(-5)$\n*   b. Repeat the calculation, but using probabilities instead of weights. What does this illustrate?", "prompt_vn": "Xét một cá nhân có hàm giá trị sau dưới lý thuyết triển vọng:\n$$\\color{#eab308}{v(w) = w^{0.8} \\quad \\text{nếu } w \\ge 0}$$\n$$\\color{#eab308}{v(w) = -3(-w)^{0.8} \\quad \\text{nếu } w < 0}$$\nCá nhân này có hàm trọng số quyết định dạng hình chữ S ngược (Kahneman-Tversky):\n$$\\color{#eab308}{\\pi(p) = \\frac{p^\\gamma}{(p^\\gamma + (1 - p)^\\gamma)^{1/\\gamma}}}$$\nVới tham số cài đặt $\\gamma = 0.65$.\n\n*   a. Cá nhân này sẽ chọn phương án nào giữa hai phương án sau?\n*   $P_A(0.001, -5000)$\n*   $P_B(-5)$\n*   b. Hãy thực hiện lại phép tính trên nhưng sử dụng xác suất khách quan $p$ thay cho trọng số quyết định $\\pi(p)$. Kết quả tính toán này minh họa cho điều gì?", "solution_en": "*   **Step-by-Step Derivation:**\n    *   **Part a. Evaluating with <span class=\"term-highlight term-concept\">Decision Weights</span>:**\n        *   For certain loss $P_B$:\n            $$\\color{#eab308}{V(P_B) = v(-5) = -3 \\times (5)^{0.8} \\approx -10.8717}$$\n        *   For risky loss $P_A$:\n            First, calculate the decision weight for $p = 0.001$:\n            $$\\color{#eab308}{\\pi(0.001) = \\frac{0.001^{0.65}}{(0.001^{0.65} + (1 - 0.001)^{0.65})^{1/0.65}} \\approx \\frac{0.01122}{1.0163} \\approx 0.01104}$$\n            *(The objective $0.1\\%$ probability is psychologically overweighted to $1.1\\%$!)*\n            \n            Now evaluate $V(P_A)$:\n            $$\\color{#eab308}{V(P_A) = \\pi(0.001) \\times v(-5000) = 0.01104 \\times \\left(-3 \\times (5000)^{0.8}\\right) \\approx 0.01104 \\times (-2730.846) \\approx -30.1485}$$\n            \n            Comparing values: $V(P_B) = -10.8717 > V(P_A) = -30.1485$.\n            The individual **chooses $P_B$** (they prefer the certain small loss of $\\$5$—purchasing insurance—over the gamble).\n    *   **Part b. Evaluating with Objective Probabilities:**\n        *   If the agent evaluates using objective probabilities:\n            $$\\color{#eab308}{V(P_A)_{\\text{objective}} = 0.001 \\times v(-5000) = 0.001 \\times (-3 \\times 910.282) \\approx -2.7308}$$\n            $$\\color{#eab308}{V(P_B) = -10.8717}$$\n            Comparing values: $V(P_A)_{\\text{objective}} = -2.7308 > V(P_B) = -10.8717$.\n            The individual would **choose $P_A$** (refusing to buy insurance).\n        *   **Illustration:** Within this prospect-theory setup, probability weighting (specifically, the overweighting of small probabilities) is needed to explain why this person buys insurance. More generally, it is one important behavioral explanation for insurance demand; whereas standard risk aversion (concave utility) is sufficient to explain insurance under Expected Utility Theory (EUT), in this setup, probability weighting is needed to explain insurance demand because the convex value function over losses alone would make the person risk-seeking over losses.", "solution_vn": "*   **Hướng dẫn giải chi tiết:**\n    *   **Câu a. Tính toán giá trị của hai phương án dùng <span class=\"term-highlight term-concept\">trọng số quyết định</span>:**\n        *   **Với phương án $P_B$ (khoản lỗ chắc chắn):**\n            $$\\color{#eab308}{V(P_B) = v(-5) = -3 \\times (5)^{0.8} \\approx -10.8717}$$\n        *   **Với phương án $P_A$ (rủi ro tổn thất lớn với xác suất nhỏ):**\n            Trọng số quyết định cho xác suất nhỏ $p = 0.001$:\n            $$\\color{#eab308}{\\pi(0.001) = \\frac{0.001^{0.65}}{(0.001^{0.65} + (1 - 0.001)^{0.65})^{1/0.65}} \\approx \\frac{0.01122}{1.0163} \\approx 0.01104}$$\n            *(Xác suất thực tế là $0.001$, nhưng qua tâm lý chủ quan đã bị phóng đại lên gấp 11 lần).*\n            \n            Giá trị triển vọng $V(P_A)$:\n            $$\\color{#eab308}{V(P_A) = \\pi(0.001) \\times v(-5000) = 0.01104 \\times \\left(-3 \\times (5
