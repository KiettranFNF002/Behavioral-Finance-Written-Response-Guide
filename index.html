 tĩnh (Statics):* Xem xét mức độ tự tin thái quá tại một thời điểm cố định để so sánh giữa các nhóm đối tượng khác nhau (ví dụ: so sánh giữa nam và nữ, giữa nhà đầu tư cá nhân và tổ chức chuyên nghiệp).\n    *   *Trạng thái động (Dynamics):* Xem xét sự tiến hóa, thay đổi của mức độ tự tin thái quá theo thời gian dưới tác động của kết quả đầu tư và phản hồi từ thị trường. Cơ chế này được vận hành bởi *sai lệch tự quy kết (self-attribution bias)*: khi thắng lợi thì quy do tài năng (tự tin tăng lên), khi thất bại thì đổ lỗi cho ngoại cảnh (tự tin không giảm), giúp sự tự tin thái quá duy trì bền bỉ trên thị trường."}, {"q_num": "2", "title_en": "Investors' Demand Curves Analysis", "title_vn": "Phân tích Đường cầu của Nhà đầu tư", "prompt_en": "Consider two investors (A and B) with the following demand curves for a stock:\n$$\\color{#eab308}{A : p = 100 - q}$$\n$$\\color{#eab308}{B : p = 150 - 2q}$$", "prompt_vn": "Xét hai nhà đầu tư (A và B) với các đường cầu đối với một cổ phiếu như sau:\n$$\\color{#eab308}{A : p = 100 - q}$$\n$$\\color{#eab308}{B : p = 150 - 2q}$$", "solution_en": "*   **a. At a price of $\\$50$, how much will A and B purchase?**\n    *   First, convert the demand curves into quantity-demanded equations:\n        *   Investor A: $p = 100 - q_A \\implies q_A = 100 - p$\n        *   Investor B: $p = 150 - 2q_B \\implies 2q_B = 150 - p \\implies q_B = 75 - 0.5p$\n    *   Substitute $p = 50$ into both equations:\n        *   **Investor A:** $q_A = 100 - 50 = 50$ units.\n        *   **Investor B:** $q_B = 75 - 0.5(50) = 75 - 25 = 50$ units.\n    *   *Answer:* Both investors will purchase exactly **$50$ units**.\n\n*   **b. If the price falls to $\\$30$, who will increase their holdings more? Explain.**\n    *   Substitute $p = 30$ into both quantity equations to find the new holdings:\n        *   **Investor A's new holdings:** $q_A' = 100 - 30 = 70$ units.\n            *   *Increase in holdings:* $\\Delta q_A = q_A' - q_A = 70 - 50 = 20$ units.\n        *   **Investor B's new holdings:** $q_B' = 75 - 0.5(30) = 75 - 15 = 60$ units.\n            *   *Increase in holdings:* $\\Delta q_B = q_B' - q_B = 60 - 50 = 10$ units.\n    *   *Answer:* **Investor A** will increase their holdings more ($\\Delta q_A = 20$ units) compared to Investor B ($\\Delta q_B = 10$ units).\n    *   *Explanation:* The slope (sensitivity) of their quantity demanded with respect to price ($dq/dp$) is different. Investor A has a price sensitivity of $|dq_A/dp| = 1$, whereas Investor B has $|dq_B/dp| = 0.5$. This makes Investor A's demand much more price-elastic (flatter curve), resulting in a larger quantity adjustment for any price change.\n\n*   **c. On this basis, which investor seems to be more overconfident?**\n    *   *Answer:* **Investor A** appears to be more overconfident.\n    *   *Explanation:* Overconfidence (specifically miscalibration) leads investors to overestimate the precision of their information. An investor who believes their private valuation of a stock is highly accurate will have a highly elastic (flatter) demand curve. They are extremely sensitive to price discrepancies: if the price falls below their valuation, they will aggressively buy a large volume, believing the market is heavily mispricing the asset. Since Investor A's demand is twice as elastic as Investor B's ($|dq_A/dp| = 1 > |dq_B/dp| = 0.5$), their trading behavior is highly aggressive, which is a hallmark of greater overconfidence.", "solution_vn": "*   **a. Tại mức giá $\\$50$, A và B sẽ mua bao nhiêu?**\n    *   Chuyển đổi các phương trình đường cầu sang hàm số thể hiện lượng cầu ($q$):\n        *   Nhà đầu tư A: $p = 100 - q_A \\implies q_A = 100 - p$\n        *   Nhà đầu tư B: $p = 150 - 2q_B \\implies 2q_B = 150 - p \\implies q_B = 75 - 0.5p$\n    *   Thay mức giá $p = 50$ vào các phương trình trên:\n        *   **Nhà đầu tư A:** $q_A = 100 - 50 = 50$ đơn vị.\n        *   **Nhà đầu tư B:** $q_B = 75 - 0.5(50) = 75 - 25 = 50$ đơn vị.\n    *   *Kết luận:* Tại mức giá $\\$50$, cả hai nhà đầu tư đều mua chính xác **$50$ đơn vị**.\n\n*   **b. Nếu giá giảm xuống $\\$30$, ai sẽ tăng lượng nắm giữ nhiều hơn? Giải thích.**\n    *   Thay mức giá mới $p = 30$ vào hai phương trình lượng cầu để tính toán lượng nắm giữ mới:\n        *   **Nhà đầu tư A:** $q_A' = 100 - 30 = 70$ đơn vị.\n            *   *Lượng tăng thêm:* $\\Delta q_A = q_A' - q_A = 70 - 50 = 20$ đơn vị.\n        *   **Nhà đầu tư B:** $q_B' = 75 - 0.5(30) = 75 - 15 = 60$ đơn vị.\n            *   *Lượng tăng thêm:* $\\Delta q_B = q_B' - q_B = 60 - 50 = 10$ đơn vị.\n    *   *Kết luận:* **Nhà đầu tư A** sẽ tăng lượng nắm giữ nhiều hơn ($\\Delta q_A = 20$ đơn vị) so với Nhà đầu tư B ($\\Delta q_B = 10$ đơn vị).\n    *   *Giải thích:* Độ nhạy cảm của lượng cầu theo giá ($dq/dp$) của hai nhà đầu tư là khác nhau. Hệ số góc (độ nhạy) của A là $|dq_A/dp| = 1$, trong khi của B chỉ là $|dq_B/dp| = 0.5$. Điều này làm cho đường cầu của nhà đầu tư A co giãn theo giá nhiều hơn (đường cầu phẳng hơn), dẫn đến phản ứng mua mạnh mẽ gấp đôi nhà đầu tư B khi giá giảm.\n\n*   **c. Trên cơ sở đó, nhà đầu tư nào có vẻ <span class=\"term-highlight term-bias\">tự tin thái quá</span> hơn?**\n    *   *Kết luận:* **Nhà đầu tư A** có vẻ tự tin thái quá hơn.\n    *   *Giải thích:* Trong tài chính hành vi, sự tự tin thái quá (dưới dạng sai lệch hiệu chuẩn) khiến nhà đầu tư đánh giá quá thấp phương sai của tài sản và tin tưởng tuyệt đối vào định giá cá nhân của mình. Do đó, đường cầu của một nhà đầu tư tự tin thái quá sẽ rất **phẳng (co giãn cực kỳ cao)**. Họ cực kỳ nhạy cảm với sự chênh lệch giá: chỉ cần giá thị trường giảm nhẹ dưới mức giá trị nội tại họ tự tính toán, họ sẵn sàng giải ngân một lượng cực lớn vì tin chắc rằng thị trường đang sai lầm. Vì nhà đầu tư A phản ứng nhạy cảm gấp đôi nhà đầu tư B trước biến động giá ($|dq_A/dp| = 1 > |dq_B/dp| = 0.5$), hành vi giao dịch hung hãn này phản ánh mức độ tự tin thái quá cao hơn rõ rệt."}, {"q_num": "3", "title_en": "Empirical Evidence: Overconfidence, Trading, and Performance", "title_vn": "Bằng chứng thực nghiệm: Tự tin thái quá, Giao dịch và Hiệu suất", "prompt_en": "Discuss what the evidence (using naturally occurring data, survey data, and experimental data) suggests about the relationship among overconfidence, trading activity, and portfolio performance.", "prompt_vn": "Thảo luận về những gì bằng chứng thực nghiệm (sử dụng dữ liệu thị trường thực tế, dữ liệu khảo sát và dữ liệu thực nghiệm) gợi ý về mối quan hệ giữa sự tự tin thái quá, hoạt động giao dịch và hiệu suất danh mục đầu tư.", "solution_en": "The relationship between overconfidence, trading activity, and performance has been documented across three main types of empirical research:\n*   **Naturally Occurring Data (Field/Market Data):**\n    *   *Barber & Odean (2000):* Studied 66,000 households at a discount brokerage and found that investors who traded the most underperformed the market index by 6.5% annually. They concluded that \"trading is hazardous to your wealth\" due to transaction costs.\n    *   *Barber & Odean (2001):* Used gender as a proxy for overconfidence (since psychology shows men are more overconfident than women). They found that men traded 45% more than women, which reduced men's net annual returns by 2.65% (compared to 1.72% for women).\n*   **Survey Data:**\n    *   *Glaser & Weber (2007):* Measured overconfidence directly using survey questionnaires (better-than-average effect and miscalibration) on retail investors and matched the results with actual trading records. They found that investors with a high \"better-than-average\" rating traded significantly more (higher volume and turnover).\n*   **Experimental Data:**\n    *   *Deaves, Lüders, & Luo (2008):* Created experimental asset markets where participants' overconfidence was measured beforehand. The experiment found that both miscalibration and the better-than-average effect lead to higher trading volume, and that overconfident traders earned lower profits in the market.", "solution_vn": "Mối quan hệ giữa sự tự tin thái quá, hoạt động giao dịch nhiều hơn và hiệu suất đầu tư kém đã được ghi nhận rộng rãi qua ba loại dữ liệu thực nghiệm:\n*   **Dữ liệu thực tế thị trường (Naturally Occurring Data):**\n    *   *Barber & Odean (2000):* Phân tích tài khoản của 66.000 hộ gia đình tại một công ty môi giới lớn và phát hiện ra rằng nhóm giao dịch nhiều nhất có tỷ suất sinh lợi ròng hàng năm thấp hơn mức trung bình thị trường đến 6.5% do chi phí giao dịch quá cao. Họ đưa ra kết luận kinh điển: *\"Giao dịch có hại cho tài sản của bạn\"*.\n    *   *Barber & Odean (2001):* Sử dụng giới tính nam làm đại diện cho mức độ tự tin thái quá cao hơn. Kết quả cho thấy nam giới giao dịch nhiều hơn nữ giới 45%, điều này làm giảm tỷ suất lợi nhuận ròng của nam giới đi 2.65% mỗi năm (so với mức giảm chỉ 1.72% ở nữ giới).\n*   **Dữ liệu khảo sát (Survey Data):**\n    *   *Glaser & Weber (2007):* Tiến hành khảo sát trực tiếp các nhà đầu tư cá nhân để đo lường các chỉ số tự tin thái quá (hiệu ứng tốt hơn trung bình và sai lệch hiệu chuẩn), sau đó đối chiếu trực tiếp với nhật ký giao dịch thực tế của họ. Kết quả cho thấy những nhà đầu tư tự đánh giá mình \"tốt hơn trung bình\" có tần suất giao dịch và vòng quay danh mục cao hơn rõ rệt.\n*   **Dữ liệu thực nghiệm phòng thí nghiệm (Experimental Data):**\n    *   *Deaves, Lüders & Luo (2008):* Thiết lập một thị trường tài sản giả định nơi mức độ tự tin thái quá của người tham gia được đo lường trước. Thực nghiệm chỉ ra bằng chứng cho thấy cả sai lệch hiệu chuẩn (khoảng tin cậy quá hẹp) và hiệu ứng tốt hơn trung bình đều có liên hệ với khối lượng giao dịch cao hơn và kết quả là những người tự tin thái quá thu về lợi nhuận ròng thấp hơn."}, {"q_num": "4", "title_en": "Underdiversification Evidence and Solutions", "title_vn": "Bằng chứng và Giải pháp cho Đa dạng hóa kém", "prompt_en": "What evidence is there that people do not diversify enough? Why is it that this occurs? What is the simplest way to \"buy\" a high level of diversification in an equity portfolio?", "prompt_vn": "Có bằng chứng nào cho thấy mọi người không đa dạng hóa danh mục đầu tư đủ tốt không? Tại sao hiện tượng này lại xảy ra? Cách đơn giản nhất để \"mua\" một mức độ đa dạng hóa cao cho danh mục đầu tư cổ phiếu là gì?", "solution_en": "*   **Evidence of <span class=\"term-highlight term-negative\">Underdiversification</span>:**\n    *   *Barber & Odean (2000):* The average investor in their database held only 4 stocks.\n    *   *Goetzmann & Kumar (2008):* Analyzed 62,000 retail accounts and found that more than 25% of investors held only a single stock, and over half held three or fewer. This concentration exposed them to severe idiosyncratic risk without any risk premium compensation.\n    *   *Home and Local Bias:* Investors systematically overweight domestic stocks and local companies with which they feel familiar.\n*   **Why it Occurs:**\n    *   *Overconfidence / Hubris:* Investors believe they can beat the market and pick the \"sure winners.\" Therefore, they feel that diversification is unnecessary or even counterproductive (\"diversification is for people who don't know what they are doing\").\n    *   *Familiarity Heuristic:* A preference for investing in familiar companies (e.g., their employer's stock or local firms), which they mistake for safe investments.\n    *   *Mental Accounting:* Treating stocks as individual, isolated bets rather than assessing the portfolio's joint risk.\n*   **Simplest Way to \"Buy\" <span class=\"term-highlight term-rational\">Diversification</span>:**\n    *   The simplest and most cost-effective method is to purchase shares of a broad-market **low-cost index fund or ETF** (e.g., an S&P 500 ETF or a Total Stock Market Index Fund). This instantly buys exposure to a broad basket of diversified companies at low cost, which substantially reduces idiosyncratic (nonsystematic) risk.", "solution_vn": "*   **Bằng chứng thực nghiệm về <span class=\"term-highlight term-negative\">Đa dạng hóa kém</span>:**\n    *   *Barber & Odean (2000):* Cho thấy một nhà đầu tư cá nhân trung bình chỉ nắm giữ vỏn vẹn 4 cổ phiếu trong danh mục của mình.\n    *   *Goetzmann & Kumar (2008):* Nghiên cứu 62,000 tài khoản cá nhân và chỉ ra hơn 25% nhà đầu tư chỉ mua duy nhất 1 cổ phiếu, và hơn một nửa chỉ giữ từ 3 cổ phiếu trở xuống. Việc tập trung vốn này khiến họ phải chịu rủi ro phi hệ thống rất lớn mà không nhận được bất kỳ phần bù rủi ro nào từ thị trường.\n    *   *Thiên kiến quê hương (Home Bias / Local Bias):* Nhà đầu tư tập trung mua cổ phiếu trong nước hoặc thậm chí các công ty có trụ sở rất gần nơi họ sống vì cảm giác quen thuộc.\n*   **Nguyên nhân gây ra hiện tượng này:**\n    *   *Sự kiêu ngạo / Tự tin thái quá (Hubris):* Nhà đầu tư tin rằng họ có khả năng phân tích để chọn ra một vài cổ phiếu \"chắc chắn chiến thắng\". Họ coi việc đa dạng hóa danh mục là không cần thiết hoặc làm loãng lợi nhuận (\"đa dạng hóa chỉ dành cho những kẻ không biết mình đang làm gì\").\n    *   *Heuristic quen thuộc (Familiarity):* Thích đầu tư vào các doanh nghiệp quen thuộc (như cổ phiếu của chính công ty mình đang làm việc hoặc công ty địa phương) và đánh đồng sự quen thuộc với tính an toàn.\n    *   *Tài khoản tinh thần (Mental Accounting):* Đánh giá từng cổ phiếu riêng lẻ như những ván cược độc lập thay vì nhìn nhận rủi ro tổng thể của toàn danh mục đầu tư.\n*   **Cách đơn giản nhất để \"mua\" mức <span class=\"term-highlight term-rational\">đa dạng hóa</span> cao:**\n    *   Giải pháp tối ưu và rẻ nhất là đầu tư vào các **quỹ chỉ số (Index Funds) hoặc quỹ ETF chi phí thấp** mô phỏng toàn bộ thị trường (ví dụ: ETF mô phỏng chỉ số S&P 500 hoặc rổ chỉ số VN30). Chỉ với một giao dịch duy nhất, nhà đầu tư đã sở hữu ngay quyền sở hữu một phần của hàng trăm, hàng ngàn doanh nghiệp để giảm thiểu phần lớn rủi ro phi hệ thống với mức chi phí rất thấp."}, {"q_num": "5", "title_en": "Stock Market Forecasters Overconfidence", "title_vn": "Sự tự tin thái quá của các Nhà dự báo thị trường chứng khoán", "prompt_en": "Research indicates that stock market forecasters are also overconfident. Do they learn from their mistakes? Discuss.", "prompt_vn": "Các nghiên cứu chỉ ra rằng các nhà dự báo thị trường chứng khoán cũng tự tin thái quá. Họ có học hỏi/rút kinh nghiệm từ những sai lầm của mình không? Hãy thảo luận.", "solution_en": "*   **Evidence of <span class=\"term-highlight term-bias\">Overconfidence</span>:**\n    *   Empirical studies show that professional stock analysts, institutional strategists, and macroeconomic forecasters are highly overconfident. Their earnings estimates are systematically overoptimistic (excessive optimism), and their confidence intervals for market levels are far too narrow (severe miscalibration).\n*   **Do They Learn From Their Mistakes?**\n    *   **No, or very slowly**, due to major psychological and structural barriers:\n        1.  *Self-Attribution Bias:* Analysts attribute correct forecasts to their superior intelligence and analytical skill, while attributing incorrect forecasts to unpredictable external events, \"black swan\" anomalies, or temporary market irrationality.\n        2.  *Hindsight Bias:* Analysts reconstruct their memories to believe they had predicted it, or that they were \"almost right,\" preventing honest self-correction.\n        3.  *Economic Conflicts of Interest:* In the finance industry, analysts are often compensated for generating trading volume or maintaining investment banking relations with covered firms. This creates institutional incentives to produce systematically overoptimistic and overconfident reports rather than unbiased, calibrated forecasts.", "solution_vn": "*   **Bằng chứng về sự <span class=\"term-highlight term-bias\">tự tin thái quá</span>:**\n    *   Các nghiên cứu tài chính thực nghiệm chỉ ra rằng các nhà phân tích cổ phiếu chuyên nghiệp và các nhà chiến lược vĩ mô là những người tự tin thái quá nhất. Các dự báo của họ liên tục mắc sai lầm lạc quan quá mức (excessive optimism) về lợi nhuận của doanh nghiệp, đồng thời các khoảng dự báo giá mục tiêu của họ luôn quá hẹp (severe miscalibration).\n*   **Họ có học hỏi từ những sai lầm của mình không?**\n    *   **Không, hoặc học hỏi cực kỳ chậm**, do các rào cản tâm lý và cấu trúc thể chế sau:\n        1.  *Sai lệch tự quy kết (Self-Attribution Bias):* Khi dự báo đúng, họ quy cho năng lực phân tích xuất chúng của mình. Khi dự báo sai, họ đổ lỗi cho các sự kiện bất khả kháng, thiên nga đen, hoặc sự phi lý trí nhất thời của thị trường. Điều này chặn đứng quá trình tự điều chỉnh nhận thức.\n        2.  *Sai lệch nhận thức muộn (Hindsight Bias):* Sau khi thị trường biến động, họ tự thuyết phục bản thân rằng \"mình đã dự báo gần đúng\" hoặc \"đã lường trước được điều này\", tạo ra ảo tưởng về năng lực dự báo trong quá khứ.\n        3.  *Xung đột lợi ích kinh tế (Conflicts of Interest):* Các nhà phân tích tại các định chế tài chính lớn chịu áp lực phải đưa ra các báo cáo tích cực và lạc quan để kích thích khách hàng giao dịch (tạo phí môi giới) hoặc duy trì quan hệ tốt đẹp nhằm giành các hợp đồng bảo lãnh phát hành của doanh nghiệp. Áp lực cấu trúc này củng cố hành vi dự báo tự tin thái quá bất chấp các sai lầm trong quá khứ."}]}];

        let activeChapterIndex = -1;
        let activeQuestionIndex = -1;
        let viewMode = 'dual'; // 'en', 'vn', 'dual'

        // Render the Sidebar chapters menu
        function initSidebar() {
            const menu = document.getElementById('chapters-menu');
            menu.innerHTML = '';

            studyData.forEach((chapter, chIdx) => {
                const group = document.createElement('div');
                group.className = 'chapter-group';
                group.id = `ch-group-${chIdx}`;

                const header = document.createElement('div');
                header.className = 'chapter-header';
                header.innerText = `Ch.${chapter.ch_num}: ${chapter.ch_title_en}`;
                header.onclick = () => toggleChapter(chIdx);

                const list = document.createElement('div');
                list.className = 'question-list';

                chapter.questions.forEach((q, qIdx) => {
                    const item = document.createElement('div');
                    item.className = 'question-item';
                    item.id = `q-item-${chIdx}-${qIdx}`;
                    item.onclick = (e) => {
                        e.stopPropagation(); // prevent collapsing chapter
                        selectQuestion(chIdx, qIdx);
                    };

                    const badge = document.createElement('span');
                    badge.className = 'q-number-badge';
                    badge.innerText = `Q.${q.q_num}`;

                    const label = document.createElement('span');
                    label.innerText = q.title_en;

                    item.appendChild(badge);
                    item.appendChild(label);
                    list.appendChild(item);
                });

                group.appendChild(header);
                group.appendChild(list);
                menu.appendChild(group);
            });
        }

        // Toggle Expand/Collapse chapter list
        function toggleChapter(chIdx) {
            const group = document.getElementById(`ch-group-${chIdx}`);
            group.classList.toggle('collapsed');
        }

        // Select Question from sidebar and load content
        function selectQuestion(chIdx, qIdx) {
            // Remove previous active state
            if (activeChapterIndex !== -1 && activeQuestionIndex !== -1) {
                const prevItem = document.getElementById(`q-item-${activeChapterIndex}-${activeQuestionIndex}`);
                if (prevItem) prevItem.classList.remove('active');
            }

            activeChapterIndex = chIdx;
            activeQuestionIndex = qIdx;

            const newItem = document.getElementById(`q-item-${chIdx}-${qIdx}`);
            if (newItem) newItem.classList.add('active');

            const chapter = studyData[chIdx];
            const q = chapter.questions[qIdx];

            // Update Header
            document.getElementById('top-bar-subtitle').innerText = `Chapter ${chapter.ch_num} - Question ${q.q_num}`;
            const titleEl = document.getElementById('top-bar-title');
            titleEl.innerText = q.title_en;
            renderMathInElement(titleEl, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ],
                throwOnError: false
            });
            document.getElementById('view-tabs').style.display = 'flex';

            renderQuestionContent();
        }

        // Set View Mode (EN, VN, Dual)
        function setViewMode(mode) {
            viewMode = mode;
            
            // Toggle active class on tab buttons
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));

            if (mode === 'dual') buttons[0].classList.add('active');
            else if (mode === 'en') buttons[1].classList.add('active');
            else if (mode === 'vn') buttons[2].classList.add('active');

            if (activeChapterIndex !== -1 && activeQuestionIndex !== -1) {
                renderQuestionContent();
            }
        }

        // Helper to parse markdown while leaving LaTeX math blocks completely untouched
        function renderMarkdownAndMath(text) {
            if (!text) return '';
            const displayMath = [];
            const inlineMath = [];

            // 1. Replace display math blocks $$...$$ with placeholders
            let processedText = text.replace(/\$\$([\s\S]*?)\$\$/g, (match, p1) => {
                displayMath.push(p1);
                return `MATHDISPLAYPLACEHOLDER${displayMath.length - 1}`;
            });

            // 2. Replace inline math blocks $...$ with placeholders
            // We match $ (not preceded by backslash) followed by characters that are either escaped dollar or not dollar, followed by $ (not preceded by backslash)
            processedText = processedText.replace(/(?<!\\)\$((?:\\\$|[^$])*?)(?<!\\)\$/g, (match, p1) => {
                inlineMath.push(p1);
                return `MATHINLINEPLACEHOLDER${inlineMath.length - 1}`;
            });

            // 3. Parse with Marked
            let html = marked.parse(processedText);

            // 4. Restore display math blocks wrapped in $$
            html = html.replace(/MATHDISPLAYPLACEHOLDER([0-9]+)/g, (match, p1) => {
                const idx = parseInt(p1, 10);
                return `$$${displayMath[idx]}$$`;
            });

            // 5. Restore inline math blocks wrapped in $
            html = html.replace(/MATHINLINEPLACEHOLDER([0-9]+)/g, (match, p1) => {
                const idx = parseInt(p1, 10);
                return `$${inlineMath[idx]}$`;
            });

            return html;
        }

        // Render Markdown content and KaTeX Math formulas
        function renderQuestionContent() {
            const container = document.getElementById('content-area');
            container.innerHTML = '';

            const chapter = studyData[activeChapterIndex];
            const q = chapter.questions[activeQuestionIndex];

            // Configure marked options
            marked.setOptions({
                breaks: true,
                gfm: true
            });

            if (viewMode === 'en') {
                // English only layout
                const layout = document.createElement('div');
                layout.className = 'stack';
                layout.style.gap = '24px';

                if (q.prompt_en) {
                    const pBox = document.createElement('div');
                    pBox.className = 'prompt-box';
                    pBox.innerHTML = `<div class="section-label">Problem Prompt</div><div class="prompt-text">${renderMarkdownAndMath(q.prompt_en)}</div>`;
                    layout.appendChild(pBox);
                }

                const sBox = document.createElement('div');
                sBox.className = 'solution-box';
                sBox.innerHTML = `<div class="section-label">Detailed Explanation & Solution</div><div class="solution-text">${renderMarkdownAndMath(q.solution_en)}</div>`;
                layout.appendChild(sBox);

                container.appendChild(layout);

            } else if (viewMode === 'vn') {
                // Vietnamese only layout
                const layout = document.createElement('div');
                layout.className = 'stack';
                layout.style.gap = '24px';

                if (q.prompt_vn) {
                    const pBox = document.createElement('div');
                    pBox.className = 'prompt-box';
                    pBox.innerHTML = `<div class="section-label">Đề bài</div><div class="prompt-text">${renderMarkdownAndMath(q.prompt_vn)}</div>`;
                    layout.appendChild(pBox);
                }

                const sBox = document.createElement('div');
                sBox.className = 'solution-box';
                sBox.innerHTML = `<div class="section-label">Hướng dẫn giải chi tiết</div><div class="solution-text">${renderMarkdownAndMath(q.solution_vn)}</div>`;
                layout.appendChild(sBox);

                container.appendChild(layout);

            } else {
                // Dual View side-by-side layout
                const dualContainer = document.createElement('div');
                dualContainer.className = 'dual-view-container';

                // English Column
                const enCol = document.createElement('div');
                enCol.className = 'dual-column';
                enCol.innerHTML = `<div class="column-header">🇬🇧 English Edition</div>`;

                if (q.prompt_en) {
                    const pBox = document.createElement('div');
                    pBox.className = 'prompt-box';
                    pBox.innerHTML = `<div class="section-label">Problem Prompt</div><div class="prompt-text">${renderMarkdownAndMath(q.prompt_en)}</div>`;
                    enCol.appendChild(pBox);
                }

                const sBoxEn = document.createElement('div');
                sBoxEn.className = 'solution-box';
                sBoxEn.innerHTML = `<div class="section-label">Detailed Solution</div><div class="solution-text">${renderMarkdownAndMath(q.solution_en)}</div>`;
                enCol.appendChild(sBoxEn);

                // Vietnamese Column
                const vnCol = document.createElement('div');
                vnCol.className = 'dual-column';
                vnCol.innerHTML = `<div class="column-header">🇻🇳 Bản dịch Tiếng Việt</div>`;

                if (q.prompt_vn) {
                    const pBoxVn = document.createElement('div');
                    pBoxVn.className = 'prompt-box';
                    pBoxVn.innerHTML = `<div class="section-label">Đề bài</div><div class="prompt-text">${renderMarkdownAndMath(q.prompt_vn)}</div>`;
                    vnCol.appendChild(pBoxVn);
                }

                const sBoxVn = document.createElement('div');
                sBoxVn.className = 'solution-box';
                sBoxVn.innerHTML = `<div class="section-label">Hướng dẫn giải</div><div class="solution-text">${renderMarkdownAndMath(q.solution_vn)}</div>`;
                vnCol.appendChild(sBoxVn);

                dualContainer.appendChild(enCol);
                dualContainer.appendChild(vnCol);
                container.appendChild(dualContainer);
            }

            // Trigger KaTeX to render all formulas in content area
            renderMathInElement(container, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ],
                throwOnError: false
            });
        }

        // Live Search Filter for Sidebar questions
        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            
            studyData.forEach((chapter, chIdx) => {
                const group = document.getElementById(`ch-group-${chIdx}`);
                let matchInChapter = false;

                chapter.questions.forEach((q, qIdx) => {
                    const item = document.getElementById(`q-item-${chIdx}-${qIdx}`);
                    const matchTitle = q.title_en.toLowerCase().includes(query) || q.title_vn.toLowerCase().includes(query);
                    const matchPrompt = q.prompt_en.toLowerCase().includes(query) || q.prompt_vn.toLowerCase().includes(query);
                    const matchSol = q.solution_en.toLowerCase().includes(query) || q.solution_vn.toLowerCase().includes(query);

                    if (matchTitle || matchPrompt || matchSol) {
                        item.style.display = 'flex';
                        matchInChapter = true;
                    } else {
                        item.style.display = 'none';
                    }
                });

                if (matchInChapter) {
                    group.style.display = 'block';
                    group.classList.remove('collapsed'); // Expand chapter to show matches
                } else {
                    group.style.display = 'none';
                }
            });

            if (query === '') {
                // Collapse chapters by default if search is cleared
                studyData.forEach((chapter, chIdx) => {
                    const group = document.getElementById(`ch-group-${chIdx}`);
                    group.classList.add('collapsed');
                });
            }
        });

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            // Hide quiz link if not running locally
            if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                const quizLink = document.getElementById('quiz-link');
                if (quizLink) quizLink.style.display = 'none';
            }
            // Collapse all chapters initially
            studyData.forEach((_, chIdx) => {
                const group = document.getElementById(`ch-group-${chIdx}`);
                group.classList.add('collapsed');
            });
            // Render math in the sidebar menu
            renderMathInElement(document.getElementById('chapters-menu'), {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ],
                throwOnError: false
            });
        });
    </script>
</body>
</html>
